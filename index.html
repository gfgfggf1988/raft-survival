<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>木筏求生</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
html,body{-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;touch-action:manipulation}
:root{
  --bg-deep:#0a0e1a;--bg-mid:#111827;--bg-card:#1a2332;--bg-hover:#243044;
  --text:#e0e7ef;--text-dim:#7a8ba3;--text-warn:#f59e0b;--text-danger:#ef4444;
  --accent:#0ea5e9;--accent-glow:#0ea5e940;--success:#22c55e;--danger:#ef4444;
  --border:#1e3a5f;--shadow:#00000060;
}
html,body{height:100%;overflow:hidden;background:var(--bg-deep);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
#game{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* 顶部状态栏 */
#topBar{display:flex;align-items:flex-start;padding:8px 10px 6px;background:linear-gradient(180deg,#0d1321,#0f172aee);z-index:10;gap:8px;min-height:44px}
#attrPanel{flex:1;display:flex;flex-direction:column;gap:3px}
.attr-row{display:flex;align-items:center;gap:4px;font-size:11px}
.attr-icon{width:16px;text-align:center;font-size:12px}
.attr-name{width:28px;color:var(--text-dim);font-size:10px}
.attr-bar{flex:1;height:8px;background:#1a2332;border-radius:4px;overflow:hidden;position:relative}
.attr-fill{height:100%;border-radius:4px;transition:width .4s ease}
.attr-val{width:48px;text-align:right;font-size:10px;color:var(--text-dim)}
.attr-fill.hp{background:linear-gradient(90deg,#ef4444,#f87171)}
.attr-fill.int{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}
.attr-fill.hunger{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.attr-fill.thirst{background:linear-gradient(90deg,#0ea5e9,#38bdf8)}
.attr-fill.luck{background:linear-gradient(90deg,#22c55e,#4ade80)}
.attr-fill.atk{background:linear-gradient(90deg,#ef4444,#f87171)}
.attr-fill.mp{background:linear-gradient(90deg,#a855f7,#c084fc)}
.warn-flash{animation:warnPulse 1s infinite}
@keyframes warnPulse{0%,100%{opacity:1}50%{opacity:.4}}

#dayInfo{text-align:right;font-size:10px;color:var(--text-dim);min-width:70px;display:flex;flex-direction:column;gap:2px;align-items:flex-end}
#dayInfo .day-num{font-size:13px;color:var(--accent);font-weight:700}
#dayInfo .time{font-size:11px}
#charStatus{font-size:28px;min-width:36px;text-align:center;align-self:center;filter:drop-shadow(0 1px 3px #00000080);transition:all .3s;display:flex;flex-direction:column;align-items:center;gap:0}
#charStatus.crazy{animation:crazyShake 0.3s infinite;filter:drop-shadow(0 0 8px #ef4444)}
#charStatus .status-label{font-size:9px;color:var(--text-dim);white-space:nowrap;max-width:48px;overflow:hidden;text-overflow:ellipsis}
#charStatus.crazy .status-label{color:var(--text-danger);font-weight:600}
@keyframes crazyShake{0%,100%{transform:translate(0)}25%{transform:translate(-2px,1px) rotate(-2deg)}50%{transform:translate(2px,-1px) rotate(1deg)}75%{transform:translate(-1px,-1px) rotate(-1deg)}}

/* 中间场景区 */
#sceneArea{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
#oceanBg{position:absolute;inset:0;background:linear-gradient(180deg,#0c1929 0%,#0f2847 30%,#134074 60%,#0a2540 100%)}
.wave{position:absolute;bottom:0;left:0;width:200%;height:60px;opacity:.15}
.wave1{background:repeating-linear-gradient(90deg,transparent,transparent 40px,#0ea5e9 40px,#0ea5e9 42px);animation:waveMove 8s linear infinite}
.wave2{background:repeating-linear-gradient(90deg,transparent,transparent 55px,#38bdf8 55px,#38bdf8 57px);animation:waveMove 12s linear infinite reverse;bottom:15px;opacity:.1}
@keyframes waveMove{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

#raftContainer{position:relative;z-index:2;width:220px;height:220px}
#raftVisual{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative}

/* 木筏绘制 */
.raft-base{position:absolute;bottom:50%;left:50%;transform:translate(-50%,50%);transition:all .5s}
.raft-planks{display:grid;gap:2px;border-radius:4px;overflow:hidden}
.raft-plank{background:#8B6914;border:1px solid #6B4F10;border-radius:2px}
.raft-shelter{position:absolute;top:-30px;left:50%;transform:translateX(-50%);display:none}
.raft-flag{position:absolute;top:-50px;right:10px;display:none}

/* 人物 */
#character{position:absolute;bottom:55%;left:50%;transform:translateX(-50%);z-index:3;font-size:28px;filter:drop-shadow(0 2px 4px #00000080)}

/* 夜间遮罩 */
#nightOverlay{position:absolute;inset:0;background:#00000000;z-index:4;pointer-events:none;transition:background 2s}

/* 场景提示 */
#sceneMsg{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:5;text-align:center;font-size:12px;color:var(--accent);opacity:0;transition:opacity .3s;white-space:nowrap;max-width:90%}
#sceneMsg.show{opacity:1}

/* 浮动物体 */
.float-item{position:absolute;z-index:3;font-size:20px;animation:floatBob 3s ease-in-out infinite;cursor:pointer}
@keyframes floatBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* 下方操作区 */
#bottomBar{padding:8px 10px 12px;background:linear-gradient(0deg,#0d1321,#0f172aee);z-index:10}
#actionGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:4px}
.act-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 6px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.act-btn:active{background:var(--bg-hover);transform:scale(.95)}
.act-btn .icon{font-size:20px;margin-bottom:2px}
.act-btn.disabled{opacity:.4;pointer-events:none}
.act-btn .cooldown-bar{position:absolute;bottom:0;left:0;height:3px;background:var(--accent);transition:width .1s linear}
#logArea{max-height:90px;overflow-y:auto;font-size:13px;color:var(--text);line-height:1.6;padding:6px 4px;scrollbar-width:none;background:var(--bg-card);border-radius:8px;margin-top:4px}
#logArea::-webkit-scrollbar{display:none}
.log-warn{color:var(--text-warn)}.log-danger{color:var(--text-danger);font-weight:600}.log-success{color:var(--success);font-weight:600}.log-event{color:var(--accent);font-weight:600}

/* 弹窗/面板通用 */
.panel-overlay{position:fixed;inset:0;background:#000000aa;z-index:100;display:none;align-items:flex-end;justify-content:center}
.panel-overlay.show{display:flex}
.panel-body{width:100%;max-width:480px;max-height:75vh;background:var(--bg-mid);border-radius:16px 16px 0 0;padding:16px;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.panel-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.panel-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px}

/* 背包面板 */
.inv-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.inv-slot{aspect-ratio:1;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;cursor:pointer;position:relative;padding:2px}
.inv-slot:hover{border-color:var(--accent)}
.inv-slot .item-icon{font-size:18px}
.inv-slot .item-count{position:absolute;bottom:1px;right:3px;font-size:9px;color:var(--text-warn)}
.inv-slot .item-name{font-size:8px;color:var(--text-dim);margin-top:1px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 战斗面板 */
.combat-panel .enemy-info{text-align:center;margin-bottom:12px}
.combat-panel .enemy-name{font-size:16px;font-weight:700;color:var(--text-danger)}
.combat-panel .enemy-hp-bar{height:10px;background:#1a2332;border-radius:5px;margin:6px 0;overflow:hidden}
.combat-panel .enemy-hp-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f87171);border-radius:5px;transition:width .3s}
.combat-panel .combat-log{background:var(--bg-deep);border-radius:8px;padding:8px;margin:8px 0;max-height:100px;overflow-y:auto;font-size:12px;line-height:1.6}
.combat-panel .combat-opts{display:flex;flex-direction:column;gap:6px}
.combat-opt{padding:10px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--text);text-align:left;transition:all .15s}
.combat-opt:active{background:var(--bg-hover);transform:scale(.98)}
.combat-opt.locked{opacity:.35;pointer-events:none}
.combat-opt .opt-tag{font-size:10px;color:var(--accent);margin-left:4px}

/* 事件面板 */
.event-panel .event-desc{background:var(--bg-deep);border-radius:8px;padding:12px;margin:8px 0;font-size:13px;line-height:1.6}
.event-panel .event-choices{display:flex;flex-direction:column;gap:6px}
.event-choice{padding:10px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--text);text-align:left}
.event-choice:active{background:var(--bg-hover)}
.event-choice .req{font-size:10px;color:var(--text-warn)}

/* 升级面板 */
.upgrade-item{padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer}
.upgrade-item:hover{border-color:var(--accent)}
.upgrade-item .ug-name{font-weight:700;font-size:14px}
.upgrade-item .ug-desc{font-size:11px;color:var(--text-dim);margin-top:4px}
.upgrade-item .ug-cost{font-size:11px;color:var(--text-warn);margin-top:4px}
.upgrade-item.cant{opacity:.4;pointer-events:none}

/* 天赋面板 */
.talent-card{padding:10px;background:var(--bg-card);border-radius:8px;margin-bottom:6px;border-left:3px solid var(--accent)}
.talent-card.rank-A{border-color:#22c55e}.talent-card.rank-S{border-color:#0ea5e9}
.talent-card.rank-SS{border-color:#a855f7}.talent-card.rank-SSS{border-color:#f59e0b}
.talent-card .t-name{font-weight:700;font-size:13px}.talent-card .t-rank{font-size:10px;float:right}
.talent-card .t-desc{font-size:11px;color:var(--text-dim);margin-top:4px}

/* 展开收起属性 */
#attrPanel.collapsed .attr-row:not(.attr-hp):not(.attr-hunger):not(.attr-thirst){display:none}
#attrToggle{background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer;padding:2px 4px}

/* 初始面板 */
#startScreen{position:fixed;inset:0;background:var(--bg-deep);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;overflow-y:auto}
#startScreen h1{font-size:28px;color:var(--accent);margin-bottom:4px;text-shadow:0 0 20px var(--accent-glow)}
#startScreen .sub{color:var(--text-dim);font-size:13px;margin-bottom:20px}
#startMenu{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center}
#startScreen .init-attrs{background:var(--bg-card);border-radius:12px;padding:16px;width:100%;margin-bottom:12px;text-align:left}
#startScreen .init-attrs .ia-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
#startScreen .init-attrs .ia-row:last-child{border:none}
#startScreen .ia-val{color:var(--accent);font-weight:700}
.start-btn{padding:14px 40px;background:linear-gradient(135deg,#0ea5e9,#0284c7);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.start-btn:active{transform:scale(.95)}
.reroll-btn{padding:8px 20px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:13px;cursor:pointer;margin-top:10px}

/* 死亡画面 */
#deathScreen{position:fixed;inset:0;background:#000000dd;z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px}
#deathScreen h2{font-size:24px;color:var(--text-danger);margin-bottom:8px}
#deathScreen .death-info{color:var(--text-dim);font-size:14px;margin-bottom:24px}

/* 睡觉面板 */
.sleep-opts{display:flex;flex-direction:column;gap:8px}
.sleep-opt{padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;cursor:pointer;text-align:center}
.sleep-opt:active{background:var(--bg-hover)}
.sleep-opt .so-hours{font-size:18px;font-weight:700;color:var(--accent)}
.sleep-opt .so-recover{font-size:11px;color:var(--text-dim)}

/* 制作面板 */
.craft-item{padding:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer}
.craft-item.cant{opacity:.4;pointer-events:none}
.craft-item .cr-name{font-weight:700;font-size:13px}.craft-item .cr-cost{font-size:11px;color:var(--text-warn);margin-top:3px}
.craft-item .cr-desc{font-size:11px;color:var(--text-dim);margin-top:2px}

/* 横幅通知 */
#toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:150;background:var(--bg-card);border:1px solid var(--accent);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--accent);display:none;animation:fadeInOut 2.5s ease;pointer-events:none;white-space:nowrap;max-width:90%}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>

<div id="startScreen">
  <h1>🌊 木筏求生</h1>
  <p class="sub">在水世界的尽头，活下去</p>
  <div id="startMenu">
    <div id="hasSaveSlot" style="display:none;margin-bottom:16px;width:100%;max-width:340px">
      <button class="start-btn" style="width:100%;margin-bottom:8px;background:linear-gradient(135deg,#22c55e,#16a34a)" onclick="loadAndStart()">📂 继续游戏</button>
      <div id="saveInfo" style="background:var(--bg-card);border-radius:8px;padding:10px;font-size:11px;color:var(--text-dim);margin-bottom:8px;text-align:left"></div>
    </div>
    <div style="width:100%;max-width:340px">
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:8px;text-align:left">🎲 新游戏 — 随机初始属性</div>
      <div class="init-attrs" id="initAttrs"></div>
      <button class="start-btn" style="width:100%" onclick="startGame()">🆕 开始新游戏</button>
      <button class="reroll-btn" onclick="rerollAttrs()">🎲 重投属性</button>
    </div>
  </div>
</div>

<div id="game">
  <div id="topBar">
    <div id="attrPanel">
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">
        <span style="font-size:11px;color:var(--text-dim)">属性</span>
        <button id="attrToggle" onclick="toggleAttrPanel()">▼</button>
      </div>
    </div>
    <div id="dayInfo">
      <div class="day-num">第 <span id="dayNum">1</span> 天</div>
      <div class="time" id="timeDisplay">06:00 ☀️</div>
      <span id="autoFishIndicator" style="display:none;font-size:10px;background:#1a3a1a;color:#22c55e;padding:1px 5px;border-radius:4px;margin-left:4px"></span>
    </div>
    <div id="charStatus">🧑</div>
  </div>

  <div id="sceneArea">
    <div id="oceanBg"></div>
    <div class="wave wave1"></div>
    <div class="wave wave2"></div>
    <div id="raftContainer">
      <div id="raftVisual"></div>
      <div id="character">🧑</div>
    </div>
    <div id="nightOverlay"></div>
    <div id="sceneMsg"></div>
  </div>

  <div id="bottomBar">
    <div id="actionGrid"></div>
    <div id="logArea"></div>
  </div>
</div>

<!-- 通用弹窗 -->
<div class="panel-overlay" id="panelOverlay">
  <div class="panel-body" id="panelBody"></div>
</div>

<div id="deathScreen">
  <h2>💀 你没能活下去...</h2>
  <div class="death-info" id="deathInfo"></div>
  <button class="start-btn" onclick="location.reload()">重新开始</button>
</div>

<div id="toast"></div>

<script>
// ==================== 游戏数据定义 ====================


// 负面状态定义
const DEBUFF_TYPES = {
  weakness:{name:'虚弱',icon:'😰',color:'#f59e0b',duration:3,effect:'atkPenalty',effectVal:0.5,desc:'攻击力减半'},
  diarrhea:{name:'腹泻',icon:'🚽',color:'#8b5cf6',duration:2,effect:'drainExtra',effectVal:{hunger:3},desc:'每小时额外流失3饱腹'},
  poison:{name:'中毒',icon:'☠️',color:'#ef4444',duration:2,effect:'drainHp',effectVal:3,desc:'每小时体力-3'},
  nerve:{name:'神经紊乱',icon:'🧠',color:'#a855f7',duration:2,effect:'intPenalty',effectVal:15,desc:'智力-15'},
};


// 食物保质期（游戏小时），放在木筏上计时，背包中保鲜不计时
const SHELF_LIFE = {
  raw_fish:6, cooked_fish:12, crab_meat:8, shark_fin:10,
  sardine:5, mackerel:6, tuna:8, salmon:7, clownfish:4, angelfish:4,
  pufferfish:3, swordfish_meat:10, eel_meat:8, whale_steak:12,
  seaweed:24, fruit:16, coconut_juice:20, mineral_water:999, rain_water:48,
  fish_soup:8, seafood_stew:6, shark_fin_soup:6, seafood_rice:8,
  whale_feast:4, ocean_banquet:3, sashimi:4, grilled_eel:10,
  crab_cake:10, tropical_salad:8, burnt_food:48, compressed_biscuit:72,
  cooked_fish:12, deluxe_soup:6, spicy_crab:8, island_feast:4, kelp_wrap:10,
  sardine_skewer:8, mackerel_steak:10, clownfish_soup:6, angel_fillet:6,
  pufferfish_delicacy:4, salmon_gravlax:8, tuna_steak:10, eel_rice:8, swordfish_grill:6,
  puffer_extreme:3, swordfish_hero:3, whale_banquet:2,
};
// 获取物品保质期（小时），0=不会变质
function getShelfLife(id){ return SHELF_LIFE[id] || 0; }
// 获取木筏物品的变质状态
function getSpoilState(raftItem){
  if(!raftItem || !raftItem.id) return 'fresh';
  const shelf = getShelfLife(raftItem.id);
  if(shelf <= 0) return 'fresh'; // 非食物或永久保存
  const totalHours = G.day * 24 + G.hour;
  const elapsed = totalHours - (raftItem.placedHour || 0);
  if(elapsed >= shelf) return 'spoiled'; // 已变质
  if(elapsed >= shelf * 0.7) return 'expiring'; // 即将变质
  return 'fresh';
}

// 物品数据库
const ITEMS = {
  // 食物
  raw_fish:{name:'生鱼',icon:'🐟',type:'food',hunger:8,thirst:0,stamina:3,desc:'新鲜的生鱼，勉强果腹',raw:true,rawEffect:{type:'diarrhea',chance:0.15}},
  cooked_fish:{name:'烤鱼',icon:'🍽️',type:'food',hunger:16,thirst:0,stamina:6,desc:'香喷喷的烤鱼，恢复较多体力'},
  compressed_biscuit:{name:'压缩饼干',icon:'🍘',type:'food',hunger:14,thirst:-5,stamina:2,desc:'半份恢复7饱腹，一份恢复14饱腹但口渴-5',halfHunger:7,halfStamina:1,halfThirst:-3},
  seaweed:{name:'海藻',icon:'🌿',type:'food',hunger:4,thirst:2,stamina:0,desc:'可以生吃的海藻'},
  fruit:{name:'热带水果',icon:'🥥',type:'food',hunger:6,thirst:5,stamina:1,desc:'含水分的水果'},
  crab_meat:{name:'蟹肉',icon:'🦀',type:'food',hunger:12,thirst:0,stamina:5,desc:'鲜美的蟹肉',raw:true,rawEffect:{type:'diarrhea',chance:0.1}},
  shark_fin:{name:'鱼翅',icon:'🦈',type:'food',hunger:20,thirst:0,stamina:10,desc:'珍贵的鱼翅，大量恢复',raw:true,rawEffect:{type:'weakness',chance:0.1}},
  // 鱼类（可小幅提升属性）
  sardine:{name:'沙丁鱼',icon:'🐟',type:'food',hunger:5,thirst:0,stamina:2,desc:'小小的沙丁鱼，微小提升体力上限',bonusAttr:'hpMax',bonusVal:1,raw:true,rawEffect:{type:'diarrhea',chance:0.08}},

// 根据玩家等级获取宝箱物品ID
function getChestIdByLevel(lv){
  if(lv >= 9) return 'chest_ancient';
  if(lv >= 7) return 'chest_deep';
  if(lv >= 5) return 'chest_mil';
  if(lv >= 3) return 'chest_iron';
  return 'chest_wood';
}

// ==================== 工具函数 ====================
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function randFloat(a,b){return Math.random()*(b-a)+a}
function pick(arr){return arr[randInt(0,arr.length-1)]}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function pct(cur,max){return Math.round(cur/max*100)}

function hasTalent(id){return G.talents.some(t=>t.id===id)}
function getTalentRank(){return G.talents.reduce((best,t)=>{const r={A:1,S:2,SS:3,SSS:4}[t.rank]||0;return r>best?r:best},0)}
// 万物共鸣：智力判定永远+30
function effectiveInt(){return getEffectiveInt()}
function itemCount(id){return G.inventory[id]||0}
function addItem(id,n=1){
  // 珊瑚船增益：探索中贝壳/珊瑚掉落翻倍
  if(G._exploring && G.flags.coralShipBonus && (id==='shell'||id==='coral') && n>=1) n*=2;
  G.inventory[id]=(G.inventory[id]||0)+n;
}
function removeItem(id,n=1){if((G.inventory[id]||0)>=n){G.inventory[id]-=n;if(G.inventory[id]<=0)delete G.inventory[id];return true}return false}
// 判断物品是否含有金属成分（珊瑚船减益用）
function isMetalItem(id){return ['metal_scrap','metal_block','circuit','tool','energy_drink','fish_spear','bone_dagger','int_book','scuba','mineral_water'].includes(id)}

function getAtkValue(){
  const wId = G.equipment?.weapon;
  if(!wId) return 0;
  const w=ITEMS[wId];
  if(!w) return 0;
  let atk=w.atk||0;
  const mastery=G.weaponMastery[w.wclass]||0;
  atk=Math.floor(atk*(1+mastery/200));
  if(G.flags.boneBonus) atk+=5; // 骨骸方舟加成
  // 虚弱debuff：攻击力减半
  if(G.debuffs && G.debuffs.find(d=>d.type==='weakness')) atk=Math.floor(atk*0.5);
  return atk;
}
function getMpValue(){
  const wId = G.equipment?.weapon;
  if(!wId) return 0;
  const w=ITEMS[wId];
  return w?w.mp||0:0;
}
function getDefValue(){
  let def = 0;
  if(G.equipment?.shoes){const s=ITEMS[G.equipment.shoes];if(s?.defBonus)def+=s.defBonus;}
  if(G.equipment?.special){const g=ITEMS[G.equipment.special];if(g?.defBonus)def+=g.defBonus;}
  return def;
}
function getDodgeValue(){
  if(G.equipment?.shoes){const s=ITEMS[G.equipment.shoes];if(s?.dodge)return s.dodge;}
  return 0;
}
function hasUnderwaterBonus(){
  if(G.equipment?.shoes && ITEMS[G.equipment.shoes]?.underwaterBonus) return true;
  if(G.equipment?.special){
    const g=ITEMS[G.equipment.special];
    return g?.underwaterBonus || G.equipment.special==='scuba' || G.equipment.special==='diving_suit';
  }
  return false;
}

function getUsedSlots(){
  return Object.keys(G.inventory).length;
}

function expForLevel(lv){
  if(lv<=1)return 50;
  if(lv<=5)return [50,120,200,300,450][lv-1];
  if(lv<=10)return [450,650,900,1200,1600][lv-5];
  return 1600+(lv-10)*500;
}

function gainExp(amount){
  G.exp+=amount;
  while(G.exp>=expForLevel(G.level)){
    G.exp-=expForLevel(G.level);
    G.level++;
    // 升级奖励
    G.attrs.hpMax+=5;
    if(G.level%2===0)G.attrs.hungerMax+=3,G.attrs.thirstMax+=3;
    if(G.level>=5)G.attrs.hpMax+=5,G.attrs.hungerMax+=5,G.attrs.thirstMax+=5;
    addLog(`🎉 升级！等级 ${G.level}，属性上限提升！`,'success');
    // 等级解锁提示
    if(G.level === 3) addLog('🎣 解锁新功能：一键钓鱼！', 'event');
    if(G.level === 5) addLog('🤖 解锁新功能：自动钓鱼！船只自动钓鱼，物品放在甲板上', 'event');
    if(G.level === 6) addLog('🤖 自动钓鱼升级：钓获物品自动收入背包！', 'event');
    // 智力每增加10点抽取天赋
    checkIntTalent();
  }
}

let lastIntTalentThreshold = 0;
function checkIntTalent(){
  const threshold = Math.floor(G.attrs.int/10);
  while(lastIntTalentThreshold < threshold){
    lastIntTalentThreshold++;
    if(lastIntTalentThreshold > 0){
      const t = rollTalent();
      if(t){
        G.talents.push(t);
        addLog(`✨ 获得天赋：${t.name}（${t.rank}级）— ${t.desc}`,'event');
        applyTalentEffect(t);
      }
    }
  }
}

function rollTalent(){
  const luck = G.attrs.luck;
  let pool;
  if(luck>=16) pool = [...TALENTS.S,...TALENTS.SS,...TALENTS.SSS];
  else if(luck>=11) pool = [...TALENTS.A,...TALENTS.S,...TALENTS.SS,...TALENTS.SSS];
  else if(luck>=6) pool = [...TALENTS.A,...TALENTS.S,...TALENTS.SS];
  else pool = [...TALENTS.A,...TALENTS.S];
  // 按权重：A:40%, S:30%, SS:20%, SSS:10%
  const weights = {A:40,S:30,SS:20,SSS:10};
  const total = pool.reduce((s,t)=>s+(weights[t.rank]||1),0);
  let r = Math.random()*total;
  for(const t of pool){
    r -= (weights[t.rank]||1);
    if(r<=0){
      if(G.talents.some(ot=>ot.id===t.id)) continue; // 已有则重抽
      return t;
    }
  }
  return pick(pool.filter(t=>!G.talents.some(ot=>ot.id===t.id)));
}

function applyTalentEffect(t){
  switch(t.id){
    case 'lucky_coin_t': G.attrs.luck+=2; G.attrs.luckMax+=2; break;
    case 'tough': G.attrs.hpMax+=10; G.attrs.hp=Math.min(G.attrs.hp+10,G.attrs.hpMax); break;
    case 'fate_child': G.attrs.luckMax=30; break;
    case 'dragon_blood':
      G.attrs.hpMax+=50;G.attrs.hungerMax+=50;G.attrs.thirstMax+=50;G.attrs.atkMax+=50;G.attrs.mpMax+=50;
      break;
  }
}

  const el = document.getElementById('logArea');
  const d = document.createElement('div');
  if(cls)d.className='log-'+cls;
  d.textContent = msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display='block';
  t.style.animation='none';
  t.offsetHeight; // reflow
  t.style.animation='fadeInOut 2.5s ease';
  setTimeout(()=>t.style.display='none',2500);
}

function renderCharStatus(){

  if(!el) return;
  const a = G.attrs;
  const isCrazy = a.hunger < 20 && a.thirst < 20;
  const isHungry = a.hunger < 20;
  const isThirsty = a.thirst < 20;
  const isWeak = a.hp < 30;
  const isSleeping = G.isSleeping;

  let icon = '🧑', label = '正常', crazy = false;

  if(isSleeping){ icon = '😴'; label = '睡眠中'; }
  else if(isCrazy){ icon = '🤯'; label = '发疯'; crazy = true; }
  else if(isWeak && isHungry){ icon = '😵'; label = '虚弱饥饿'; }
  else if(isWeak && isThirsty){ icon = '😵'; label = '虚弱口渴'; }
  else if(isHungry && isThirsty){ icon = '😰'; label = '又饥又渴'; }
  else if(isHungry){ icon = '😰'; label = '饥饿'; }
  else if(isThirsty){ icon = '🥵'; label = '口渴'; }
  else if(isWeak){ icon = '😮‍💨'; label = '虚弱'; }
  else if(G.isNight){ icon = '🧑‍🦯'; label = '夜行'; }
  else if(a.hp >= a.hpMax * 0.8){ icon = '🧑'; label = '健康'; }

  // debuff状态叠加
  let debuffLabel = '';
  if(G.debuffs && G.debuffs.length > 0){
    debuffLabel = G.debuffs.map(d => {
      const def = DEBUFF_TYPES[d.type];
      return def ? def.icon + def.name + d.remaining + 'h' : '';
    }).filter(Boolean).join(' ');
    if(debuffLabel && !isCrazy){
      icon = '🤒'; label = debuffLabel;
    }
  }

  el.innerHTML = `${icon}<span class="status-label">${label}</span>`;
  if(crazy){
    el.classList.add('crazy');
  } else {
    el.classList.remove('crazy');
  }
}

// ==================== 时间系统 ====================
const DAY_DURATION = 600000; // 10分钟=1天(ms)
const HOUR_DURATION = DAY_DURATION / 24;

function updateGameTime(dt){
  if(G.isDead || G.isSleeping) return;
  G.realTimeAccum += dt;
  while(G.realTimeAccum >= HOUR_DURATION){
    G.realTimeAccum -= HOUR_DURATION;
    advanceHour();
  }
}

function updateWeather(){
  if(!G.weather) G.weather = 'clear';
  if(!G.weatherTimer) G.weatherTimer = 0;
  G.weatherTimer--;
  // 天气结束，随机切换
  if(G.weatherTimer <= 0){
    const oldWeather = G.weather;
    const roll = Math.random();
    if(G.isNight){
      // 夜间更多大雾
      if(roll<0.35) G.weather='clear';
      else if(roll<0.55) G.weather='cloudy';
      else if(roll<0.65) G.weather='rain';
      else if(roll<0.85) G.weather='fog';
      else G.weather='storm';
    } else {
      // 白天更多晴朗和热浪
      if(roll<0.40) G.weather='clear';
      else if(roll<0.60) G.weather='cloudy';
      else if(roll<0.75) G.weather='rain';
      else if(roll<0.82) G.weather='fog';
      else if(roll<0.92) G.weather='heatwave';
      else G.weather='storm';
    }
    G.weatherTimer = randInt(3, 8); // 持续3-8小时
    if(G.weather !== oldWeather){
      const wInfo = WEATHERS[G.weather];
      addLog(`${wInfo.icon} 天气变化：${wInfo.name} — ${wInfo.desc}`,'event');
      // 海藻巨筏雨天额外恢复
      if(G.weather==='rain' && G.flags.kelpBonus){
        G.attrs.thirst=Math.min(G.attrs.thirstMax,G.attrs.thirst+10);
        addLog('🌿 海藻巨筏雨天效果：额外+10水分','success');
      }
    }
  }
  // 暴风雨每小时概率造成伤害（时空感知天赋免疫）
  if(G.weather==='storm' && Math.random()<0.3){
    if(hasTalent('spacetime')){
      addLog('🌀 时空感知天赋发动！暴风雨对你毫无影响。','success');
    } else {
      const dmg=randInt(3,8);G.raftHp=Math.max(0,G.raftHp-dmg);
      addLog(`⛈️ 暴风雨侵蚀木筏！耐久-${dmg}`,'danger');
      if(G.flags.kelpBonus){G.raftHp=Math.max(0,G.raftHp-dmg);addLog('🌿 海藻巨筏柔软结构受损翻倍！','danger');}
    }
  }
  // 天气触发专属事件
  const weatherEvts = WEATHER_EVENTS[G.weather];
  if(weatherEvts && Math.random() < 0.04 && !G.eventState){
    const evt = pick(weatherEvts);
    G.eventState = evt;
    renderEvent();
  }
}


// 获取有效攻击力（考虑debuff）
function getEffectiveAtk(){
  let atk = G.attrs.atk;
  const weakDebuff = G.debuffs && G.debuffs.find(d=>d.type==='weakness');
  if(weakDebuff) atk = Math.floor(atk * 0.5);
  return atk;
}
// 获取有效智力（考虑debuff）
function getEffectiveInt(){
  let int_ = G.attrs.int;
  const nerveDebuff = G.debuffs && G.debuffs.find(d=>d.type==='nerve');
  if(nerveDebuff) int_ = Math.max(0, int_ - 15);
  if(hasTalent('resonance')) int_ += 30;
  return int_;
}

function advanceHour(){
  G.hour++;
  if(G.hour >= 24){
    G.hour = 0;
    G.day++;
    G.totalDaysSurvived++;
    G.undyingUsed = false;
    // 每10天奖励经验
    if(G.day % 10 === 0){
      gainExp(30);
      addLog('📅 生存10天，获得30经验！','success');
    }
    // 天赋每日效果
    if(hasTalent('dew_collect')) G.attrs.thirst = Math.min(G.attrs.thirst+5, G.attrs.thirstMax);
    if(hasTalent('dragon_blood')){
      G.attrs.hp=Math.min(G.attrs.hp+5,G.attrs.hpMax);
      G.attrs.hunger=Math.min(G.attrs.hunger+5,G.attrs.hungerMax);
      G.attrs.thirst=Math.min(G.attrs.thirst+5,G.attrs.thirstMax);
    }
    if(G.furniture.includes('_raincollect')) G.attrs.thirst = Math.min(G.attrs.thirst+5, G.attrs.thirstMax);
    if(G.furniture.includes('_garden')) G.attrs.hunger = Math.min(G.attrs.hunger+3, G.attrs.hungerMax);
    // 生物船每日效果
    if(G.flags.kelpBonus){G.attrs.hunger=Math.min(G.attrs.hungerMax,G.attrs.hunger+8);G.attrs.thirst=Math.min(G.attrs.thirstMax,G.attrs.thirst+6);addLog('🌿 海藻巨筏每日效果：饱腹+8 水分+6','success');}
    if(G.flags.boneBonus){} // 骨骸方舟效果在战斗时触发
    // 珍珠宫殿：事件概率增加（在事件触发逻辑中处理）
    // 海王天赋：每天可选择1种海洋生物获取掉落物
    if(hasTalent('sea_king') && !G.seaKingUsed){
      G.seaKingPending = true;
      addLog('👑 海王天赋：今日可召唤海洋生物获取掉落物！','event');
    }
    G.seaKingUsed = false;
  }
  // 属性消耗（每小时）
  let hungerDrain = 1.5;
  let thirstDrain = 1.8;
  if(hasTalent('water_saver')) thirstDrain *= 0.85;
  // === 天气影响 ===
  updateWeather();
  const w = G.weather;
  if(w === 'heatwave'){hungerDrain += 0.5;thirstDrain += 1.0;} // 热浪：饱腹+0.5，水分+1.0
  else if(w === 'rain'){thirstDrain = Math.max(0, thirstDrain - 0.8);G.attrs.thirst = Math.min(G.attrs.thirstMax, G.attrs.thirst + 1);} // 雨天：水分消耗-0.8且+1
  else if(w === 'fog'){hungerDrain += 0.2;} // 大雾：饱腹微增
  if(hasTalent('night_owl') && G.isNight) { hungerDrain *= 0.7; thirstDrain *= 0.7; } // 夜猫子：夜间消耗-30%
  // === 木筏物品变质检查 ===
  if(G.onRaftItems && G.onRaftItems.length > 0){
    const totalH = G.day * 24 + G.hour;
    const toRemove = [];
    G.onRaftItems.forEach((ri,i) => {
      if(!ri || !ri.id) return;
      const shelf = getShelfLife(ri.id);
      if(shelf <= 0) return;
      const elapsed = totalH - (ri.placedHour || 0);
      // 变质2倍时间后自动消失（腐烂）
      if(elapsed >= shelf * 2){
        toRemove.push(i);
        addLog(`🗑️ ${ITEMS[ri.id]?.icon||''} ${ITEMS[ri.id]?.name||ri.id} 在木筏上腐烂消失了！`,'warn');
      }
    });
    for(let i=toRemove.length-1;i>=0;i--){
      G.onRaftItems.splice(toRemove[i], 1);
    }
  }

  // === 负面状态处理 ===
  if(G.debuffs && G.debuffs.length > 0){
    const expired = [];
    G.debuffs.forEach(d => {
      const def = DEBUFF_TYPES[d.type];
      if(!def) return;
      // 应用效果
      if(def.effect === 'drainHp'){
        G.attrs.hp = Math.max(0, G.attrs.hp - def.effectVal);
      } else if(def.effect === 'drainExtra'){
        if(def.effectVal.hunger) G.attrs.hunger = Math.max(0, G.attrs.hunger - def.effectVal.hunger);
        if(def.effectVal.thirst) G.attrs.thirst = Math.max(0, G.attrs.thirst - def.effectVal.thirst);
      } else if(def.effect === 'atkPenalty'){
        // atkPenalty 在攻击时判断，这里只减倒计时
      } else if(def.effect === 'intPenalty'){
        // intPenalty 在智力判断时处理，这里只减倒计时
      }
      d.remaining--;
      if(d.remaining <= 0) expired.push(d);
    });
    // 移除已过期的debuff
    expired.forEach(d => {
      const def = DEBUFF_TYPES[d.type];
      addLog(`${def.icon} ${def.name}已恢复！`,'success');
      G.debuffs.splice(G.debuffs.indexOf(d), 1);
    });
  }

  G.attrs.hunger = Math.max(0, Math.round((G.attrs.hunger - hungerDrain)*100)/100);
  G.attrs.thirst = Math.max(0, Math.round((G.attrs.thirst - thirstDrain)*100)/100);
  // 低属性报警
  if(G.attrs.hunger < 20 && G.attrs.hunger > 0) addLog('⚠️ 饥饿度过低，请尽快进食！','warn');
  if(G.attrs.thirst < 20 && G.attrs.thirst > 0) addLog('⚠️ 水分度过低，请尽快饮水！','warn');
  // 发疯状态：饥饿和水分均低于20
  if(G.attrs.hunger < 20 && G.attrs.thirst < 20){
    if(!G.flags.crazyWarned){
      G.flags.crazyWarned = true;
      addLog('🤯 你感到意识模糊...发疯状态！体力额外消耗，可能产生幻觉！','danger');
    }
    // 发疯状态效果：体力额外消耗
    G.attrs.hp = Math.max(0, G.attrs.hp - 1);
  } else {
    G.flags.crazyWarned = false;
  }
  // 归零检测
  if(G.attrs.hunger <= 0 && G.attrs.thirst <= 0){
    if(hasTalent('undying') && G.undyingDays < 2){
      G.undyingDays++;
      addLog('🔥 不灭意志发动！你勉强撑过了一天...','event');
    } else {
      playerDeath('饥饿和脱水同时降临');
    }
  }
  // 夜间事件
  if(G.hour === 20) addLog('🌙 夜幕降临，危险增加...','event');
  if(G.hour === 6) addLog('☀️ 天亮了','success');
  // === 自动钓鱼（等级5+解锁）===
  if(G.level >= 5 && G.raftLv >= 2 && G.hour % 2 === 0){
    doAutoFish();
  }
  // 疲劳系统：深夜不睡觉的惩罚
  if(G.hour === 23 && !G.isSleeping) addLog('😴 你感到困倦...深夜钓鱼体力消耗增加','warn');
  if(G.hour === 1 && !G.isSleeping) addLog('😫 你非常疲惫！所有操作体力消耗翻倍','danger');
  if(G.hour === 3 && !G.isSleeping) addLog('😵 你快要撑不住了！体力持续流失，无法钓鱼','danger');
  // 03:00-05:00每小时自动扣体力（未睡觉时）
  if(G.hour >= 3 && G.hour < 5 && !G.isSleeping){
    G.attrs.hp = Math.max(0, G.attrs.hp - 1);
  }
  // 随机事件（每小时概率）
  let eventChance = 0.06 + (G.isNight ? 0.04 : 0);
  if(G.flags.bioShip==='pearl_palace') eventChance += 0.03; // 珍珠宫殿事件概率+30%
  if(G.weather==='fog') eventChance += 0.03; // 大雾事件概率增加
  if(G.attrs.hunger < 20 && G.attrs.thirst < 20) eventChance += 0.05; // 发疯状态增加事件概率
  if(Math.random() < eventChance){
    // 发疯状态下10%概率是幻觉
    if(G.attrs.hunger < 20 && G.attrs.thirst < 20 && Math.random() < 0.1){
      addLog('👁️ 你隐约看到了什么...但什么也没有。幻觉？','warn');
    } else {
      triggerRandomEvent();
    }
  }
  // 夜间怪物袭击（野性直觉：提前1小时预警）
  if(G.isNight && Math.random() < 0.08){
    if(hasTalent('wild_instinct') && Math.random() < 0.5){
      // 野性直觉：50%概率提前感知，进入战斗但首回合怪物不攻击
      addLog('🐾 野性直觉发动！你感知到了危险的气息，提前做好了准备！','event');
      triggerMonsterAttack();
      if(combat) combat.wildInstinctBonus = true;
    } else {
      triggerMonsterAttack();
    }
  }
  renderAll();
}

function playerDeath(reason){
  G.isDead = true;
  document.getElementById('deathInfo').textContent = `你生存了 ${G.day} 天，等级 ${G.level}。死因：${reason}`;
  document.getElementById('deathScreen').style.display = 'flex';
  localStorage.removeItem('raftSave');
}

// ==================== 自动钓鱼系统 ====================
function doAutoFish(){
  if(G.level < 5 || G.raftLv < 2) return;
  // 自动钓鱼：不消耗玩家体力，每2小时触发1次
  // 模拟1次钓鱼判定（无体力消耗、不消耗鱼竿耐久、不推进时间）
  let typeRoll = Math.random() * 100;
  let chestBonus = G.attrs.luck * 0.3;
  if(hasTalent('sea_bless')) chestBonus += 3;

  const toBackpack = G.level >= 6; // 6级自动入背包

  if(typeRoll < 12){
    // 空竿
    return;
  } else if(typeRoll < 25 + chestBonus){
    // 宝箱 - 存入背包
    const chestId = getChestIdByLevel(G.level);
    if(getUsedSlots() < G.maxSlots || G.inventory[chestId]){
      addItem(chestId);
      addLog(`🤖 自动钓鱼获得${ITEMS[chestId].icon}${ITEMS[chestId].name}！→背包`, 'success');
    } else {
      addLog('🤖 自动钓鱼钓到宝箱但背包已满！','warn');
    }
    return;
  }

  // 钓到鱼
  let roll = Math.random() * 100;
  let luckBonus = 0;
  if(G.attrs.luck >= 15) luckBonus = 4;
  else if(G.attrs.luck >= 10) luckBonus = 2;
  if(hasTalent('eagle_eye')) luckBonus += 2;
  if(hasTalent('sea_bless')) luckBonus += 1;

  let rarity;
  if(roll < 1 + luckBonus) rarity=5;
  else if(roll < 4 + luckBonus * 1.2) rarity=4;
  else if(roll < 12 + luckBonus * 1.5) rarity=3;
  else if(roll < 35 + luckBonus * 2) rarity=2;
  else rarity=1;

  // 自动钓鱼用低一档的鱼表（比手动差一些）
  const autoRarity = Math.max(1, rarity - 1);
  const fishTable = {
    1:[{id:'seaweed',n:1,w:25},{id:'sardine',n:1,w:20},{id:'raw_fish',n:1,w:18},{id:'rope',n:1,w:15},{id:'wood',n:1,w:15},{id:'vine',n:1,w:7}],
    2:[{id:'mackerel',n:1,w:16},{id:'angelfish',n:1,w:12},{id:'salmon',n:1,w:10},{id:'wood',n:2,w:14},{id:'cloth',n:1,w:14},{id:'shell',n:1,w:12},{id:'metal_scrap',n:1,w:12},{id:'rope',n:1,w:10}],
    3:[{id:'tuna',n:1,w:14},{id:'crab_meat',n:1,w:12},{id:'eel_meat',n:1,w:8},{id:'cloth',n:2,w:14},{id:'metal_scrap',n:2,w:14},{id:'fish_bone',n:1,w:12},{id:'mineral_water',n:1,w:8},{id:'rope',n:1,w:10},{id:'pearl',n:1,w:8}],
    4:[{id:'swordfish_meat',n:1,w:14},{id:'shark_fin',n:1,w:10},{id:'mineral_water',n:1,w:10},{id:'energy_drink',n:1,w:8},{id:'metal_scrap',n:3,w:16},{id:'pearl',n:1,w:10},{id:'metal_block',n:1,w:8},{id:'shell',n:2,w:14},{id:'cloth',n:2,w:10}],
    5:[{id:'whale_steak',n:1,w:6},{id:'int_book',n:1,w:12},{id:'tool',n:1,w:12},{id:'pearl',n:2,w:16},{id:'deep_crystal',n:1,w:10},{id:'circuit',n:1,w:8},{id:'lucky_coin',n:1,w:8},{id:'metal_block',n:1,w:12},{id:'energy_drink',n:1,w:10},{id:'gear',n:1,w:6}]
  };

  const table = fishTable[autoRarity] || fishTable[1];
  const totalW = table.reduce((s,e)=>s+e.w,0);
  let r = Math.random() * totalW;
  let caught = null;
  for(const entry of table){r -= entry.w;if(r <= 0){caught = entry;break;}}
  if(!caught) caught = table[0];

  const item = ITEMS[caught.id];
  if(!item) return;

  const dest = toBackpack ? '背包' : '甲板';
  if(toBackpack){
    addItem(caught.id, caught.n);
  } else {
    for(let i=0;i<caught.n;i++) G.onRaftItems.push({id:caught.id,placedHour:G.day*24+G.hour});
  }

  const rarityNames = {1:'普通',2:'优质',3:'稀有',4:'传说',5:'神话'};
  addLog(`🤖 自动钓鱼：${item.icon} ${item.name}${caught.n>1?' ×'+caught.n:''}（${rarityNames[autoRarity]||'普通'}）→ ${dest}`, 'success');
}

  html += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">';

  const options = [
    {n:1, desc:'单次钓鱼', icon:'🎣'},
    {n:3, desc:'连续3次', icon:'🎣🎣🎣'},
    {n:5, desc:'连续5次', icon:'🎣x5'},
    {n:10, desc:'连续10次', icon:'🎣x10'},
  ];
  options.forEach(opt => {
    const totalCost = staminaCost * opt.n;
    const totalDur = opt.n * 2; // 最多消耗
    const canDo = G.attrs.hp >= totalCost && G.rodDurability >= opt.n;
    html += `<div class="event-choice${canDo?'':' cant'}" onclick="${canDo?`doBatchFish(${opt.n})`:''}" style="display:flex;justify-content:space-between;align-items:center">
      <span>${opt.icon} ${opt.desc}</span>
      <span style="font-size:11px;color:${canDo?'var(--text-dim)':'var(--text-warn)'}">体力-${totalCost} 耐久~${totalDur}%</span>
    </div>`;
  });
  html += '</div>';
  body.innerHTML = html;
  openPanel();
}

function calcFishStaminaCost(){
  let cost = 2;
  if(G.hour >= 23 || G.hour < 1) cost += 2;
  else if(G.hour >= 1 && G.hour < 3) cost = cost * 2;
  if(G.flags.boneBonus) cost += 3;
  if(hasTalent('angler')) cost = Math.ceil(cost * 0.8);
  return cost;
}

function doBatchFish(count){
  closePanel();
  const results = {items:{}, totalStamina:0, totalDur:0, catches:0, empty:0, chests:0};
  for(let i=0;i<count;i++){
    if(G.rodDurability <= 0){addLog('⚠️ 鱼竿损坏，停止钓鱼！','danger');break;}
    if(G.attrs.hp < 5){addLog('⚠️ 体力不足，停止钓鱼！','warn');break;}
    if(G.hour >= 3 && G.hour < 5){addLog('⚠️ 太疲惫了，停止钓鱼！','warn');break;}
    const fishResult = doFishOnce(true); // silent模式
    if(fishResult){
      results.totalStamina += fishResult.staminaCost;
      results.totalDur += fishResult.durCost;
      if(fishResult.type === 'empty') results.empty++;
      else if(fishResult.type === 'chest') results.chests++;
      else {
        results.catches++;
        if(fishResult.items){
          fishResult.items.forEach(item => {
            results.items[item.id] = (results.items[item.id]||0) + item.n;
          });
        }
      }
    }
  }
  // 汇总日志
  let summary = `🎣 连续钓鱼${count}次完成！`;
  if(results.catches > 0) summary += ` 钓到${results.catches}次`;
  if(results.chests > 0) summary += ` 宝箱${results.chests}个`;
  if(results.empty > 0) summary += ` 空竿${results.empty}次`;
  addLog(summary, 'success');
  // 物品汇总
  Object.entries(results.items).forEach(([id,n]) => {
    if(ITEMS[id]) addLog(`  ${ITEMS[id].icon} ${ITEMS[id].name} x${n}`, 'success');
  });
  addLog(`体力-${results.totalStamina}，鱼竿耐久-${results.totalDur}`, 'info');
  renderAll();
  saveGame();
}

function doFish(){
  doFishOnce(false);
}

function doFishOnce(silent){
  if(G.rodDurability <= 0){if(!silent)showToast('鱼竿已损坏！');return null;}
  if(G.attrs.hp < 5){if(!silent)showToast('体力不足！');return null;}
  if(G.isSleeping){if(!silent)showToast('正在睡觉...');return null;}
  if(G.hour >= 3 && G.hour < 5){if(!silent)showToast('你太疲惫了，无法钓鱼...');return null;}

  // 消耗体力（疲劳时额外消耗）
  let staminaCost = 2;
  if(G.hour >= 23 || G.hour < 1) staminaCost += 2;
  else if(G.hour >= 1 && G.hour < 3) staminaCost = staminaCost * 2;
  if(G.flags.boneBonus) staminaCost += 3; // 骨骸方舟减益：钓鱼体力消耗+3
  if(hasTalent('angler')) staminaCost = Math.ceil(staminaCost * 0.8); // 钓手天赋：钓鱼体力消耗-20%
  G.attrs.hp = Math.max(0, G.attrs.hp - staminaCost);

  // 消耗鱼竿耐久
  const durCost = randInt(1, 2);
  G.rodDurability = Math.max(0, G.rodDurability - durCost);

  // 鱼竿低耐久提示
  if(G.rodDurability > 0 && G.rodDurability <= 5){
    showToast('⚠️ 鱼竿耐久不足5%！即将损坏！', 'danger');
    addLog('⚠️ 鱼竿耐久仅剩'+G.rodDurability+'%，即将损坏！','danger');
  }

  // 消耗游戏时间10分钟
  advanceMinutes(10);

  // 首先判定：鱼/宝箱/空竿
  let typeRoll = Math.random() * 100;
  let chestBonus = G.attrs.luck * 0.5;
  if(hasTalent('sea_bless')) chestBonus += 5;

  const result = {staminaCost, durCost, items:[], type:'empty'};

  if(typeRoll < 8){
    // 空竿
    if(!silent) addLog('🌊 什么也没钓到...体力-'+staminaCost+'，鱼竿耐久-'+durCost);
    // 珊瑚船额外材料
    if(G.flags.coralShipBonus && Math.random()<0.4){
      const mat=pick(['shell','coral','seaweed']);addItem(mat);
      if(!silent) addLog(`🪸 珊瑚船附带收获：${ITEMS[mat].icon} ${ITEMS[mat].name}`,'success');
      result.items.push({id:mat,n:1});
    }
    G.stats.fishCaught++;
    if(!silent) renderAll();
    return result;
  } else if(typeRoll < 28 + chestBonus){
    // 宝箱 - 存入背包
    result.type = 'chest';
    const chestId = getChestIdByLevel(G.level);
    if(getUsedSlots() >= G.maxSlots && !G.inventory[chestId]){
      addLog('📦 钓到宝箱但背包已满！','warn');
    } else {
      addItem(chestId);
      addLog(`${ITEMS[chestId].icon} 获得${ITEMS[chestId].name}！已存入背包`,'success');
    }
    if(!silent) renderAll();
    return result;
  }

  // ===== 钓到鱼 =====
  let roll = Math.random() * 100;
  let luckBonus = 0;
  if(G.attrs.luck >= 15) luckBonus = 6;
  else if(G.attrs.luck >= 10) luckBonus = 3;
  if(hasTalent('eagle_eye')) luckBonus += 3;
  if(hasTalent('sea_bless')) luckBonus += 2;

  let rarity, rarityName;
  if(roll < 2 + luckBonus){rarity=5;rarityName='神话'}
  else if(roll < 6 + luckBonus * 1.5){rarity=4;rarityName='传说'}
  else if(roll < 16 + luckBonus * 2){rarity=3;rarityName='稀有'}
  else if(roll < 40 + luckBonus * 2.5){rarity=2;rarityName='优质'}
  else {rarity=1;rarityName='普通'}

  const fishTable = {
    1:[{id:'seaweed',n:2,w:20},{id:'sardine',n:1,w:15},{id:'raw_fish',n:1,w:12},{id:'clownfish',n:1,w:8},{id:'rope',n:2,w:18},{id:'wood',n:2,w:16},{id:'vine',n:2,w:11}],
    2:[{id:'mackerel',n:1,w:14},{id:'angelfish',n:1,w:10},{id:'salmon',n:1,w:8},{id:'mineral_water',n:1,w:6},{id:'wood',n:3,w:16},{id:'cloth',n:2,w:14},{id:'shell',n:2,w:10},{id:'rope',n:2,w:12},{id:'metal_scrap',n:2,w:10}],
    3:[{id:'tuna',n:1,w:12},{id:'crab_meat',n:1,w:10},{id:'eel_meat',n:1,w:8},{id:'pufferfish',n:1,w:6},{id:'cloth',n:3,w:14},{id:'metal_scrap',n:3,w:14},{id:'fish_bone',n:3,w:12},{id:'vine',n:2,w:10},{id:'mineral_water',n:1,w:6},{id:'rope',n:2,w:8}],
    4:[{id:'swordfish_meat',n:1,w:12},{id:'whale_steak',n:1,w:4},{id:'shark_fin',n:1,w:8},{id:'fish_spear',n:1,w:8},{id:'bone_dagger',n:1,w:6},{id:'mineral_water',n:2,w:8},{id:'energy_drink',n:1,w:6},{id:'metal_scrap',n:4,w:14},{id:'cloth',n:3,w:12},{id:'shell',n:3,w:10},{id:'pearl',n:1,w:6},{id:'metal_block',n:1,w:6}],
    5:[{id:'bone_bow',n:1,w:12},{id:'int_book',n:1,w:10},{id:'lucky_coin',n:1,w:10},{id:'conch_horn',n:1,w:8},{id:'tool',n:1,w:10},{id:'pearl',n:3,w:14},{id:'scuba',n:1,w:6},{id:'whale_steak',n:1,w:4},{id:'energy_drink',n:1,w:6},{id:'metal_block',n:2,w:8},{id:'deep_crystal',n:1,w:6},{id:'circuit',n:1,w:6}]
  };

  const table = fishTable[rarity] || fishTable[1];
  const totalW = table.reduce((s,e)=>s+e.w,0);
  let r = Math.random() * totalW;
  let caught = null;
  for(const entry of table){r -= entry.w;if(r <= 0){caught = entry;break;}}
  if(!caught) caught = table[0];

  // 图鉴记录：钓到鱼
  G.codex.fish[caught.id] = true;

  // 丰收天赋
  let extraItem = null;
  if(hasTalent('harvest') && Math.random() < 0.5){
    const eTable = fishTable[Math.max(1,rarity-1)];
    const eTotal = eTable.reduce((s,e)=>s+e.w,0);
    let er = Math.random() * eTotal;
    for(const e of eTable){er-=e.w;if(er<=0){extraItem=e;break;}}
    if(!extraItem) extraItem = eTable[0];
  }
  // 海神庇佑：必出额外1件（与丰收可叠加）
  let blessingItem = null;
  if(hasTalent('ocean_blessing')){
    const bTable = fishTable[Math.max(1,rarity)];
    const bTotal = bTable.reduce((s,e)=>s+e.w,0);
    let br = Math.random() * bTotal;
    for(const e of bTable){br-=e.w;if(br<=0){blessingItem=e;break;}}
    if(!blessingItem) blessingItem = bTable[0];
  }

  const caughtItem = ITEMS[caught.id];
  const caughtEffect = caughtItem ? getItemEffectText(caughtItem, caught.id) : '';
  const bagFull = getUsedSlots() >= G.maxSlots && !G.inventory[caught.id];

  result.type = 'fish';
  result.rarityName = rarityName;
  result.items.push({id:caught.id, n:caught.n});

  if(silent){
    // 批量模式：直接收入背包，不弹窗
    if(!bagFull){
      addItem(caught.id, caught.n);
    } else {
      G.onRaftItems.push({id:caught.id,placedHour:G.day*24+G.hour});
    }
    if(extraItem){
      addItem(extraItem.id, extraItem.n);
      result.items.push({id:extraItem.id, n:extraItem.n});
    }
    if(blessingItem){
      addItem(blessingItem.id, blessingItem.n);
      result.items.push({id:blessingItem.id, n:blessingItem.n});
    }
  } else {
    // 单次模式：弹窗展示
    G._pendingCatch = {id:caught.id, n:caught.n, rarityName, staminaCost, durCost, extraItem, blessingItem, effect:caughtEffect, bagFull};
    showCatchDialog();
  }

  G.stats.fishCaught++;
  if(!silent) renderAll();
  return result;
}

function showCatchDialog(){
  if(!G._pendingCatch) return;
  const c = G._pendingCatch;
  const item = ITEMS[c.id];
  if(!item) return;
  const body = document.getElementById('panelBody');
  const qColors = {普通:'#22c55e',优质:'#3b82f6',稀有:'#a855f7',传说:'#f59e0b',神话:'#ef4444'};
  const qColor = qColors[c.rarityName] || 'var(--text)';
  let html = `<div class="panel-title">🎣 钓到了！<button class="panel-close" onclick="discardCatch()">✕</button></div>`;
  html += `<div style="text-align:center;padding:12px 0">
    <div style="font-size:40px;margin-bottom:8px">${item.icon}</div>
    <div style="font-size:16px;font-weight:700">${item.name}${c.n>1?' ×'+c.n:''}</div>
    <div style="font-size:13px;color:${qColor};font-weight:600;margin-top:4px">【${c.rarityName}】</div>
    <div style="font-size:12px;color:var(--text-dim);margin-top:4px">${c.effect}</div>
    <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${item.desc}</div>
    <div style="font-size:11px;color:var(--text-dim);margin-top:6px">体力-${c.staminaCost} · 鱼竿耐久-${c.durCost}</div>
  </div>`;
  if(c.extraItem){
    html += `<div style="text-align:center;font-size:12px;color:#22c55e;padding:4px">🌟 丰收额外：${ITEMS[c.extraItem.id]?.icon||''} ${ITEMS[c.extraItem.id]?.name||c.extraItem.id}×${c.extraItem.n}</div>`;
  }
  if(c.blessingItem){
    html += `<div style="text-align:center;font-size:12px;color:#38bdf8;padding:4px">🔱 海神庇佑额外：${ITEMS[c.blessingItem.id]?.icon||''} ${ITEMS[c.blessingItem.id]?.name||c.blessingItem.id}×${c.blessingItem.n}</div>`;
  }
  html += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">';
  // 可直接使用的物品（食物/饮品/特殊物品/武器）
  const canUseDirectly = item.type === 'food' || item.type === 'drink' || item.type === 'weapon' || item.type === 'shoes' || item.type === 'gear' || (item.type === 'special' && (item.luckBonus || item.intBonus));
  if(canUseDirectly){
    html += `<div class="event-choice" onclick="catchUseDirect()" style="text-align:center;background:#1a2e3e;border-color:var(--accent)">✋ 直接使用</div>`;
  }
  if(!c.bagFull){
    html += `<div class="event-choice" onclick="catchToBag()" style="text-align:center;background:#1a2e1a;border-color:#22c55e">🎒 放入背包</div>`;
  } else {
    html += `<div style="text-align:center;font-size:12px;color:var(--text-warn);padding:4px">⚠️ 背包已满</div>`;
  }
  html += `<div class="event-choice" onclick="catchToRaft()" style="text-align:center;background:#2e2a1a;border-color:#f59e0b">📦 放到木筏上</div>`;
  html += `<div class="event-choice" onclick="discardCatch()" style="text-align:center;background:#2e1a1a;border-color:#ef4444">🗑️ 丢弃</div>`;
  html += '</div>';
  body.innerHTML = html;
  openPanel();
}

function catchToBag(){
  const c = G._pendingCatch;
  if(!c) return;
  addItem(c.id, c.n);
  addLog(`🎣 钓到【${c.rarityName}】${ITEMS[c.id].name}×${c.n} → 放入背包`,'success');
  handleExtraCatch(c);
  G._pendingCatch = null;
  closePanel();
  renderAll();
}

// 直接使用钓到的物品
function catchUseDirect(){
  const c = G._pendingCatch;
  if(!c) return;
  const item = ITEMS[c.id];
  if(!item) return;
  G._pendingCatch = null;
  closePanel();
  // 压缩饼干特殊处理
  if(c.id === 'compressed_biscuit'){
    addItem(c.id, c.n);
    handleExtraCatch(c);
    showBiscuitChoice(c.id);
    return;
  }
  // 食物
  if(item.type === 'food'){
    let hunger = item.hunger || 0, thirst = item.thirst || 0, stamina = item.stamina || 0;
    if(G.furniture.includes('_cook')){hunger=Math.floor(hunger*1.3);stamina=Math.floor(stamina*1.3);}
    if(hasTalent('iron_stomach')) hunger=Math.floor(hunger*1.2);
    if(hasTalent('fast_metab')) stamina+=10;
    G.attrs.hunger=clamp(G.attrs.hunger+hunger,0,G.attrs.hungerMax);
    G.attrs.thirst=clamp(G.attrs.thirst+thirst,0,G.attrs.thirstMax);
    G.attrs.hp=clamp(G.attrs.hp+stamina,0,G.attrs.hpMax);
    let msg = `🍖 使用了 ${item.name}（饱腹${hunger>0?'+':''}${hunger} 水分${thirst>0?'+':''}${thirst} 体力${stamina>0?'+':''}${stamina}）`;
    if(item.bonusAttr && !(item.poisonChance && Math.random()<item.poisonChance)){
      const bv=item.bonusVal||1;
      if(item.bonusAttr==='luck'){G.attrs.luck=Math.min(G.attrs.luckMax,G.attrs.luck+bv);msg+=` 🍀幸运+${bv}`;}
      else if(item.bonusAttr==='int'){G.attrs.int+=bv;msg+=` 🧠智力+${bv}`;checkIntTalent();}
      else{G.attrs[item.bonusAttr]+=bv;const an={hpMax:'体力上限',hungerMax:'饱腹上限',thirstMax:'水分上限'}[item.bonusAttr]||item.bonusAttr;msg+=` ⬆️${an}+${bv}`;}
    } else if(item.poisonChance && Math.random()<item.poisonChance){
      const dmg=randInt(5,12);G.attrs.hp=Math.max(0,G.attrs.hp-dmg);msg+=` ⚠️中毒！体力-${dmg}`;
    }
    addLog(msg,'success');
  }
  // 饮品
  else if(item.type === 'drink'){
    let thirst=item.thirst||0, stamina=item.stamina||0, hunger=item.hunger||0;
    if(hasTalent('fast_metab')) stamina+=10;
    G.attrs.thirst=clamp(G.attrs.thirst+thirst,0,G.attrs.thirstMax);
    G.attrs.hp=clamp(G.attrs.hp+stamina,0,G.attrs.hpMax);
    G.attrs.hunger=clamp(G.attrs.hunger+hunger,0,G.attrs.hungerMax);
    addLog(`💧 使用了 ${item.name}（水分${thirst>0?'+':''}${thirst} 体力${stamina>0?'+':''}${stamina}）`,'success');
  }
  // 武器
  else if(item.type === 'weapon'){
    if(G.equipment?.weapon){
      addLog(`⚔️ 卸下了 ${ITEMS[G.equipment.weapon].name}，装备了 ${item.name}！`,'success');
    } else {
      addLog(`⚔️ 装备了 ${item.name}！`,'success');
      showToast('解锁武力值/精神值！');
    }
    G.equipment.weapon = c.id;
  }
  // 鞋子
  else if(item.type === 'shoes'){
    if(G.equipment.shoes) addLog(`👢 卸下了 ${ITEMS[G.equipment.shoes].name}，装备了 ${item.name}！`,'success');
    else addLog(`👢 装备了 ${item.name}！`,'success');
    G.equipment.shoes = c.id;
  }
  // 特殊装备
  else if(item.type === 'gear'){
    if(G.equipment.special) addLog(`📦 卸下了 ${ITEMS[G.equipment.special].name}，装备了 ${item.name}！`,'success');
    else addLog(`📦 装备了 ${item.name}！`,'success');
    G.equipment.special = c.id;
  }
  // 特殊物品
  else if(item.type === 'special'){
    if(item.luckBonus){G.attrs.luck+=item.luckBonus;addLog(`🍀 使用了 ${item.name}，幸运+${item.luckBonus}！`,'success');}
    else if(item.intBonus){G.attrs.int+=item.intBonus;addLog(`🧠 使用了 ${item.name}，智力+${item.intBonus}！`,'success');checkIntTalent();}
    else if(c.id==='scuba'){G.hasScuba=true;addLog('🤿 获得潜水装备！解锁水下探索！','event');}
  }
  handleExtraCatch(c);
  renderAll();
}

function catchToRaft(){
  const c = G._pendingCatch;
  if(!c) return;
  for(let i=0;i<c.n;i++) G.onRaftItems.push({id:c.id,placedHour:G.day*24+G.hour});
  addLog(`🎣 钓到【${c.rarityName}】${ITEMS[c.id].name}×${c.n} → 放到木筏上`,'success');
  handleExtraCatch(c);
  G._pendingCatch = null;
  closePanel();
  renderAll();
}

function discardCatch(){
  const c = G._pendingCatch;
  const ch = G._pendingChest;
  if(c){addLog(`丢弃了 ${ITEMS[c.id]?.name||'物品'}`);handleExtraCatch(c);}
  if(ch){addLog('丢弃了宝箱剩余物品');}
  G._pendingCatch = null;
  G._pendingChest = null;
  closePanel();
}

function handleExtraCatch(c){
  if(c.extraItem){
    addItem(c.extraItem.id, c.extraItem.n);
    addLog(`🌟 丰收！额外获得 ${ITEMS[c.extraItem.id].name}×${c.extraItem.n}`,'success');
  }
  if(c.blessingItem){
    addItem(c.blessingItem.id, c.blessingItem.n);
    addLog(`🔱 海神庇佑！额外获得 ${ITEMS[c.blessingItem.id].name}×${c.blessingItem.n}`,'success');
  }
  // 珊瑚船额外材料
  if(G.flags.coralShipBonus && Math.random()<0.35){
    const mat=pick(['shell','coral','seaweed']);addItem(mat);
    addLog(`🪸 珊瑚船附带：${ITEMS[mat].icon} ${ITEMS[mat].name}`,'success');
  }
}

// ==================== 宝箱系统 ====================
function doChest(staminaCost, durCost, forceChestType){
  const lv = G.level;
  let chestType, chestIcon, chestName, slots;
  if(forceChestType){
    chestType = forceChestType;
    const chestNames = {1:{icon:'🪵',name:'漂流木箱'},2:{icon:'📦',name:'铁皮箱'},3:{icon:'🧰',name:'军用箱'},4:{icon:'💎',name:'深海箱'},5:{icon:'🔮',name:'远古箱'}};
    chestIcon = chestNames[chestType]?.icon || '📦';
    chestName = chestNames[chestType]?.name || '宝箱';
  } else {
    if(lv >= 9){chestType=5;chestIcon='🔮';chestName='远古箱';slots=4;}
    else if(lv >= 7){chestType=4;chestIcon='💎';chestName='深海箱';slots=3;}

  </div>`;

function generateChestContents(chestType){
  const contents = [];
  const pick = (table) => {
    const total = table.reduce((s,e)=>s+e.w,0);
    let r = Math.random()*total;
    for(const e of table){r-=e.w;if(r<=0)return e;}
    return table[0];
  };
  const guaranteeTable = {
    1:[{id:'wood',n:4,w:60},{id:'rope',n:3,w:40}],
    2:[{id:'wood',n:6,w:45},{id:'metal_scrap',n:3,w:30},{id:'rope',n:4,w:25}],
    3:[{id:'wood',n:8,w:35},{id:'metal_scrap',n:4,w:30},{id:'metal_block',n:2,w:20},{id:'cloth',n:3,w:15}],
    4:[{id:'metal_block',n:3,w:40},{id:'deep_crystal',n:2,w:30},{id:'pearl',n:3,w:15},{id:'circuit',n:1,w:15}],
    5:[{id:'deep_crystal',n:3,w:35},{id:'pearl',n:5,w:30},{id:'monster_core',n:2,w:20},{id:'circuit',n:2,w:15}]
  };
  contents.push(pick(guaranteeTable[chestType]));
  const slotCounts = {1:2,2:2,3:3,4:3,5:4};
  const slots = slotCounts[chestType] || 2;
  const randomTables = {
    1:[{id:'mineral_water',n:1,w:20},{id:'seaweed',n:3,w:18},{id:'cloth',n:2,w:18},{id:'metal_scrap',n:2,w:16},{id:'raw_fish',n:1,w:10},{id:'compressed_biscuit',n:1,w:8},{id:'vine',n:2,w:10}],
    2:[{id:'rope',n:3,w:18},{id:'cloth',n:2,w:16},{id:'mineral_water',n:2,w:14},{id:'metal_scrap',n:3,w:14},{id:'pearl',n:1,w:10},{id:'mackerel',n:1,w:10},{id:'crab_meat',n:1,w:8},{id:'compressed_biscuit',n:1,w:5},{id:'fish_spear',n:1,w:5}],
    3:[{id:'metal_block',n:2,w:16},{id:'rope',n:4,w:14},{id:'pearl',n:2,w:12},{id:'energy_drink',n:1,w:10},{id:'tuna',n:1,w:8},{id:'tool',n:1,w:8},{id:'cloth',n:3,w:10},{id:'bone_bow',n:1,w:5},{id:'iron_sword',n:1,w:5},{id:'iron_axe',n:1,w:5},{id:'gear',n:1,w:5},{id:'scuba',n:1,w:2}],
    4:[{id:'pearl',n:3,w:16},{id:'deep_crystal',n:2,w:14},{id:'circuit',n:2,w:12},{id:'whale_steak',n:1,w:8},{id:'bone_bow',n:1,w:8},{id:'iron_sword',n:1,w:8},{id:'coral',n:2,w:7},{id:'vine',n:4,w:6},{id:'trident',n:1,w:1},{id:'monster_core',n:1,w:4},{id:'int_book',n:1,w:6},{id:'metal_block',n:2,w:10}],
    5:[{id:'monster_core',n:2,w:16},{id:'circuit',n:3,w:14},{id:'gear',n:3,w:12},{id:'whale_steak',n:1,w:8},{id:'trident',n:1,w:8},{id:'abyss_eye',n:1,w:6},{id:'scuba',n:1,w:6},{id:'lucky_coin',n:1,w:8},{id:'int_book',n:1,w:6},{id:'deep_crystal',n:3,w:8},{id:'pearl',n:4,w:8}]
  };
  for(let i=1;i<slots;i++){
    const entry = pick(randomTables[chestType]);
    const existing = contents.find(c=>c.id===entry.id);
    if(existing) existing.n += entry.n;
    else contents.push({...entry});
  }
  return contents;
}

// 海神庇佑：宝箱额外物品
function generateChestBonusItem(chestType){
  const randomTables = {
    1:[{id:'wood',n:2,w:30},{id:'rope',n:2,w:25},{id:'vine',n:1,w:20},{id:'seaweed',n:2,w:15},{id:'cloth',n:1,w:10}],
    2:[{id:'metal_scrap',n:2,w:25},{id:'cloth',n:2,w:20},{id:'rope',n:2,w:20},{id:'mineral_water',n:1,w:15},{id:'shell',n:1,w:10},{id:'pearl',n:1,w:10}],
    3:[{id:'metal_block',n:1,w:25},{id:'pearl',n:2,w:20},{id:'cloth',n:2,w:15},{id:'tool',n:1,w:15},{id:'energy_drink',n:1,w:10},{id:'rope',n:3,w:15}],
    4:[{id:'deep_crystal',n:1,w:25},{id:'pearl',n:2,w:20},{id:'circuit',n:1,w:20},{id:'metal_block',n:2,w:15},{id:'monster_core',n:1,w:10},{id:'gear',n:1,w:10}],
    5:[{id:'deep_crystal',n:2,w:25},{id:'circuit',n:2,w:20},{id:'pearl',n:3,w:20},{id:'monster_core',n:1,w:15},{id:'lucky_coin',n:1,w:10},{id:'int_book',n:1,w:10}]
  };
  const table = randomTables[chestType] || randomTables[1];
  const total = table.reduce((s,e)=>s+e.w,0);
  let r = Math.random()*total;
  for(const e of table){r-=e.w;if(r<=0) return {id:e.id,n:e.n};}
  return {...table[0]};
}

// 批量钓鱼时自动开箱，返回物品ID列表
function rollChestItems(){
  const lv = G.level;
  let chestType;
  if(lv >= 9) chestType=5;
  else if(lv >= 7) chestType=4;
  else if(lv >= 5) chestType=3;
  else if(lv >= 3) chestType=2;
  else chestType=1;
  const contents = generateChestContents(chestType);
  if(hasTalent('ocean_blessing')){
    const bonusSlot = generateChestBonusItem(chestType);
    if(bonusSlot) contents.push(bonusSlot);
  }
  const ids = [];
  contents.forEach(c => {
    for(let i=0;i<c.n;i++) ids.push(c.id);
  });
  return ids;
}

function chestItemToBag(idx){
  if(!G._pendingChest) return;
  const c = G._pendingChest.contents[idx];
  if(!c) return;
  if(getUsedSlots() >= G.maxSlots && !G.inventory[c.id]){showToast('背包已满！');return}
  G._pendingChest.contents.splice(idx, 1);
  addItem(c.id, c.n);
  addLog(`📦 ${ITEMS[c.id]?.name||c.id}×${c.n} 放入背包`,'success');
  if(G._pendingChest.contents.length === 0){G._pendingChest=null;closePanel();renderAll();return;}
  doChest(0, 0);
}

function chestItemToRaft(idx){
  if(!G._pendingChest) return;
  const c = G._pendingChest.contents[idx];
  if(!c) return;
  G._pendingChest.contents.splice(idx, 1);
  for(let i=0;i<c.n;i++) G.onRaftItems.push({id:c.id,placedHour:G.day*24+G.hour});
  addLog(`📦 ${ITEMS[c.id]?.name||c.id}×${c.n} 放到木筏上`,'warn');
  if(G._pendingChest.contents.length === 0){G._pendingChest=null;closePanel();renderAll();return;}
  doChest(0, 0);
}

function chestAllToBag(){
  if(!G._pendingChest) return;
  let fullCount = 0;
  G._pendingChest.contents.forEach(c=>{
    if(getUsedSlots() >= G.maxSlots && !G.inventory[c.id]){fullCount++;return;}
    addItem(c.id, c.n);
    addLog(`📦 ${ITEMS[c.id]?.name||c.id}×${c.n} 放入背包`,'success');
  });
  if(fullCount > 0) showToast(`${fullCount}件物品背包已满`);
  G._pendingChest = null;
  closePanel();
  renderAll();
}

// 批量开启宝箱弹窗
function openChestBatch(chestId){

// 执行批量开箱
function doChestBatch(chestId, count){
  const item = ITEMS[chestId];
  if(!item) return;
  const actualCount = Math.min(count, G.inventory[chestId] || 0);
  if(actualCount <= 0) return;
  removeItem(chestId, actualCount);

  // 生成所有宝箱内容并合并
  const totalRewards = {};
  for(let i = 0; i < actualCount; i++){
    const contents = generateChestContents(item.chestType);
    if(hasTalent('ocean_blessing')){
      const bonusSlot = generateChestBonusItem(item.chestType);
      if(bonusSlot) contents.push(bonusSlot);
    }
    contents.forEach(c => {
      totalRewards[c.id] = (totalRewards[c.id] || 0) + c.n;
    });
  }

  // 保存到临时状态
  G._batchChestRewards = totalRewards;
  G._batchChestName = item.name;
  G._batchChestIcon = item.icon;
  G._batchChestCount = actualCount;
  renderBatchChestResult();
}

// 游戏时间推进（分钟）
function advanceMinutes(mins){
  G.minute = (G.minute||0) + mins;
  while(G.minute >= 60){
    G.minute -= 60;
    advanceHour();
  }
}

// ==================== 背包系统 ====================
function getItemEffectText(item, id){
  if(item.type === 'food'){
    const parts = [];
    if(item.hunger) parts.push(`饱腹+${item.hunger}`);
    if(item.thirst) parts.push(`水分${item.thirst>0?'+':''}${item.thirst}`);
    if(item.stamina) parts.push(`体力+${item.stamina}`);
    if(item.bonusAttr){
      const attrName = {hpMax:'体力上限',hungerMax:'饱腹上限',thirstMax:'水分上限',luck:'幸运',int:'智力'}[item.bonusAttr]||item.bonusAttr;
      parts.push(`${attrName}+${item.bonusVal}`);
    }
    if(item.rawEffect){const dt=DEBUFF_TYPES[item.rawEffect.type];parts.push(`${dt?dt.icon:''}${dt?dt.name:'负面'}${Math.round(item.rawEffect.chance*100)}%`);}
    return parts.join(' · ');
  }
  if(item.type === 'drink'){
    const parts = [];
    if(item.thirst) parts.push(`水分+${item.thirst}`);
    if(item.stamina) parts.push(`体力+${item.stamina}`);
    if(item.hunger) parts.push(`饱腹+${item.hunger}`);
    return parts.join(' · ');
  }
  if(item.type === 'weapon') return `攻击:${item.atk} 精神:${item.mp}`;
  if(item.type === 'special'){
    if(item.luckBonus) return `幸运+${item.luckBonus}`;
    if(item.intBonus) return `智力+${item.intBonus}`;
    if(id === 'scuba') return '解锁水下探索';
    return item.desc;
  }
  if(item.type === 'tool'){
    if(id === 'fishing_rod') return `耐久${G.rodDurability}/100`;
    return item.desc;
  }
  return item.desc;
}

      if(item.type === 'weapon'){
        qualityColor = item.quality === 'mythic' ? '#ef4444' : item.quality === 'legendary' ? '#f59e0b' : '#3b82f6';
      }
      // 类型标签色
      const typeColor = item.type==='food'?'#22c55e':item.type==='drink'?'#38bdf8':item.type==='material'?'#f59e0b':item.type==='weapon'?'#ef4444':item.type==='shoes'?'#a855f7':item.type==='chest'?'#e879f9':'var(--text-dim)';

          ${isChest?`<button style="font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid #e879f9;background:#2e1a3e;color:#e879f9;cursor:pointer;white-space:nowrap" onclick="openChestBatch('${id}')">🔑开启</button>`:''}

  // 木筏上的物品区
  html += `<div style="margin-top:10px;font-size:12px;color:var(--text-warn);margin-bottom:6px">⚠️ 木筏表面 · 无保鲜 · 食物会变质（放入背包保鲜！）</div>`;
  if(G.onRaftItems.length > 0){

    G.onRaftItems.forEach((ri,i)=>{

      const item = ITEMS[id];

      const canUse = item && (item.type === 'food' || item.type === 'drink' || item.type === 'weapon' || item.type === 'shoes' || item.type === 'gear' || (item.type === 'special' && (item.luckBonus || item.intBonus)));

      const spoilTag = spoil==='spoiled' ? '<span style="color:#ef4444;font-size:10px;font-weight:700">⚠️已变质</span>' : spoil==='expiring' ? '<span style="color:#f59e0b;font-size:10px">⏳即将变质</span>' : '';
      const spoilBorder = spoil==='spoiled' ? '#ef4444' : spoil==='expiring' ? '#f59e0b' : '#7a5a00';
      // 保质期倒计时
      const shelf = getShelfLife(id);
      let shelfInfo = '';
      if(shelf > 0 && ri.placedHour){
        const elapsed = (G.day*24+G.hour) - ri.placedHour;

        <span style="font-size:24px;min-width:28px;text-align:center${spoil==='spoiled'?';filter:grayscale(0.5)':''}">${item?.icon||'📦'}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${item?.name||id} ${spoilTag}</div>

        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
          ${canUse?`<button style="font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid ${spoil==='spoiled'?'#ef4444':'#22c55e'};background:${spoil==='spoiled'?'#2e1a1a':'#1a2e1a'};color:${spoil==='spoiled'?'#ef4444':'#22c55e'};cursor:pointer;white-space:nowrap" onclick="useRaftItem(${i})">${spoil==='spoiled'?'⚠️使用':'使用'}</button>`:''}

  html += '<div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">⚔️ 装备栏</div>';
  // 武器槽
  const weaponItem = G.equipment.weapon ? ITEMS[G.equipment.weapon] : null;
  html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg-card);border-radius:6px;margin-bottom:4px;border:1px solid var(--border)">
    <span style="font-size:14px;width:20px">⚔️</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;font-weight:600">${weaponItem ? weaponItem.icon+' '+weaponItem.name+' (攻击:'+getAtkValue()+' 精神:'+getMpValue()+')' : '<span style="color:var(--text-dim)">空</span>'}</div>
    </div>
    ${weaponItem ? `<button style="font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer" onclick="unequipItem('weapon','bag')">卸下</button><button style="font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid #ef4444;background:transparent;color:#ef4444;cursor:pointer" onclick="unequipItem('weapon','dismantle')">分解</button>` : ''}
  </div>`;
  // 鞋子槽
  const shoesItem = G.equipment.shoes ? ITEMS[G.equipment.shoes] : null;
  const shoesEffect = shoesItem ? (shoesItem.staminaSave ? '体力消耗-'+shoesItem.staminaSave+'%' : '')+(shoesItem.dodge ? ' 闪避+'+shoesItem.dodge+'%' : '')+(shoesItem.defBonus ? ' 防御+'+shoesItem.defBonus : '') : '';
  html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg-card);border-radius:6px;margin-bottom:4px;border:1px solid var(--border)">
    <span style="font-size:14px;width:20px">👟</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;font-weight:600">${shoesItem ? shoesItem.icon+' '+shoesItem.name+' ('+shoesEffect.trim()+')' : '<span style="color:var(--text-dim)">空</span>'}</div>
    </div>
    ${shoesItem ? `<button style="font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer" onclick="unequipItem('shoes','bag')">卸下</button><button style="font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid #ef4444;background:transparent;color:#ef4444;cursor:pointer" onclick="unequipItem('shoes','dismantle')">分解</button>` : ''}
  </div>`;
  // 特殊装备槽
  const gearItem = G.equipment.special ? ITEMS[G.equipment.special] : null;
  const gearEffect = gearItem ? (gearItem.defBonus ? '防御+'+gearItem.defBonus : '')+(gearItem.luckBonus ? ' 幸运+'+gearItem.luckBonus : '')+(gearItem.underwaterBonus||G.equipment.special==='scuba' ? ' 水下探索' : '') : '';
  html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg-card);border-radius:6px;margin-bottom:4px;border:1px solid var(--border)">
    <span style="font-size:14px;width:20px">📦</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;font-weight:600">${gearItem ? gearItem.icon+' '+gearItem.name+' ('+gearEffect.trim()+')' : '<span style="color:var(--text-dim)">空</span>'}</div>
    </div>
    ${gearItem ? `<button style="font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer" onclick="unequipItem('special','bag')">卸下</button><button style="font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid #ef4444;background:transparent;color:#ef4444;cursor:pointer" onclick="unequipItem('special','dismantle')">分解</button>` : ''}
  </div>`;

  // 鱼竿
  html += `<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg-card);border-radius:6px;margin-bottom:4px;border:1px solid var(--border)">
    <span style="font-size:14px;width:20px">🎣</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;font-weight:600;${G.rodDurability<=5?'color:#ff4444':''}">鱼竿 耐久${G.rodDurability}/100${G.rodDurability<=5&&G.rodDurability>0?' ⚠️':''}</div>
    </div>`;
  if(G.rodDurability < 100 && G.rodDurability > 0){
    const canRepair = itemCount('wood') >= 1;
    html += `<button style="font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid ${canRepair?'var(--accent)':'var(--border)'};background:transparent;color:${canRepair?'var(--accent)':'var(--text-dim)'};cursor:${canRepair?'pointer':'default'}" onclick="${canRepair?'repairRod()':''}">🔧修复</button>`;
  } else if(G.rodDurability <= 0){
    const canRepair = itemCount('wood') >= 2 && itemCount('rope') >= 1;
    html += `<span style="color:var(--text-danger);font-size:10px">已损坏!</span>`;
    html += `<button style="font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid ${canRepair?'var(--accent)':'var(--border)'};background:transparent;color:${canRepair?'var(--accent)':'var(--text-dim)'};cursor:${canRepair?'pointer':'default'}" onclick="${canRepair?'repairBrokenRod()':''}">🔧大修</button>`;
  }
  html += '</div></div>';

  body.innerHTML = html;
  openPanel();
  // 恢复滚动位置
  body.scrollTop = scrollTop;
  const newBagList = document.getElementById('bagListScroll');
  const newRaftList = document.getElementById('raftListScroll');
  if(newBagList) newBagList.scrollTop = bagScrollTop;
  if(newRaftList) newRaftList.scrollTop = raftScrollTop;
}

// 物品移到木筏
function moveToRaft(itemId){
  if(!G.inventory[itemId]) return;
  const count = G.inventory[itemId];
  removeItem(itemId, count);
  for(let i=0;i<count;i++) G.onRaftItems.push({id:itemId,placedHour:G.day*24+G.hour});
  addLog(`📤 将 ${ITEMS[itemId]?.name||itemId}×${count} 取出到木筏上`,'warn');
  openInventory(); // 刷新面板
}

// 卸下/分解装备
function unequipItem(slot, action){
  const itemId = G.equipment[slot];
  if(!itemId) return;
  const item = ITEMS[itemId];
  if(!item) return;

  if(action === 'bag'){
    if(getUsedSlots() >= G.maxSlots && !G.inventory[itemId]){
      showToast('背包已满！');return;
    }
    addItem(itemId);
    addLog(`📤 卸下 ${item.name} 放入背包`,'success');
  } else if(action === 'dismantle'){
    const returns = DISMANTLE_TABLE[itemId] || [{id:'wood',n:1}];
    returns.forEach(r => addItem(r.id, r.n));
    const retStr = returns.map(r => `${ITEMS[r.id]?.icon||r.id}×${r.n}`).join(' ');
    addLog(`🔨 分解了 ${item.name}，获得 ${retStr}`,'success');
  }

  G.equipment[slot] = null;
  openInventory();
  renderAll();
}

// 背包内分解确认弹窗
function confirmDismantleFromBag(id){
  const item = ITEMS[id];
  if(!item) return;
  const returns = DISMANTLE_TABLE[id];
  if(!returns){showToast('该物品无法分解');return;}

  const body = document.getElementById('panelBody');
  const isRare = item.quality === 'legendary' || item.quality === 'mythic';
  const retStr = returns.map(r => `${ITEMS[r.id]?.icon||''} ${ITEMS[r.id]?.name||r.id}×${r.n}`).join('、');

  let html = `<div class="panel-title">🔨 分解确认<button class="panel-close" onclick="closePanel();openInventory()">✕</button></div>`;
  html += `<div style="padding:12px;text-align:center">`;
  html += `<div style="font-size:32px;margin-bottom:8px">${item.icon}</div>`;
  html += `<div style="font-size:15px;font-weight:600;margin-bottom:4px">${item.name}</div>`;
  if(isRare) html += `<div style="font-size:12px;color:#ef4444;margin-bottom:8px">⚠️ 这是稀有装备，确认分解？</div>`;
  html += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:12px">分解后获得：${retStr}</div>`;
  html += `<div style="display:flex;gap:8px">`;
  html += `<button style="flex:1;padding:10px;border-radius:8px;border:1px solid #ef4444;background:#2e1a1a;color:#ef4444;cursor:pointer;font-size:14px;font-weight:600" onclick="doDismantleFromBag('${id}')">确认分解</button>`;
  html += `<button style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);cursor:pointer;font-size:14px" onclick="closePanel();openInventory()">取消</button>`;
  html += `</div></div>`;
  body.innerHTML = html;
  openPanel();
}

function doDismantleFromBag(id){
  const item = ITEMS[id];
  if(!item) return;
  const returns = DISMANTLE_TABLE[id];
  if(!returns){showToast('该物品无法分解');return;}
  if(!removeItem(id)){showToast('物品不存在');return;}
  returns.forEach(r => addItem(r.id, r.n));
  const retStr = returns.map(r => `${ITEMS[r.id]?.icon||r.id}×${r.n}`).join(' ');
  addLog(`🔨 分解了 ${item.name}，获得 ${retStr}`,'success');
  closePanel();
  openInventory();
  renderAll();
}

// 鱼竿修复
function repairRod(){
  if(!removeItem('wood',1)) return;
  let repair = randInt(15, 25);
  if(hasTalent('tinkerer')) repair = Math.floor(repair * 1.4);
  G.rodDurability = Math.min(100, G.rodDurability + repair);
  addLog(`🔧 修复鱼竿 +${repair}耐久（当前${G.rodDurability}/100）`,'success');
  openInventory();
}

function repairBrokenRod(){
  if(!removeItem('wood',2) || !removeItem('rope',1)) return;
  let repair = randInt(40, 60);
  if(hasTalent('tinkerer')) repair = Math.floor(repair * 1.4);
  G.rodDurability = Math.min(100, repair);
  addLog(`🔧 大修鱼竿！恢复耐久至${G.rodDurability}/100`,'success');
  openInventory();
}

function useItem(id){
  const item = ITEMS[id];
  if(!item) return;

  if(item.type === 'food'){
    if(item.id === 'compressed_biscuit'){
      showBiscuitChoice(id);
      return;
    }
    let hunger = item.hunger || 0;
    let thirst = item.thirst || 0;
    let stamina = item.stamina || 0;
    if(G.furniture.includes('_cook')){hunger=Math.floor(hunger*1.3);stamina=Math.floor(stamina*1.3);}
    if(hasTalent('iron_stomach')){hunger=Math.floor(hunger*1.2);}
    if(hasTalent('fast_metab')){stamina+=10;}
    // 珊瑚船减益：金属相关物品效果-20%
    if(G.flags.coralShipBonus && isMetalItem(id)){hunger=Math.floor(hunger*0.8);thirst=Math.floor(thirst*0.8);stamina=Math.floor(stamina*0.8);}
    removeItem(id);
    G.attrs.hunger = clamp(G.attrs.hunger + hunger, 0, G.attrs.hungerMax);
    G.attrs.thirst = clamp(G.attrs.thirst + thirst, 0, G.attrs.thirstMax);
    G.attrs.hp = clamp(G.attrs.hp + stamina, 0, G.attrs.hpMax);
    let logMsg = `🍖 使用了 ${item.name}（饱腹${hunger>0?'+':''}${hunger} 水分${thirst>0?'+':''}${thirst} 体力${stamina>0?'+':''}${stamina}）`;
    // 生食负面效果判定（不同生食不同debuff）
    let poisoned = false;
    if(item.raw && item.rawEffect && Math.random() < item.rawEffect.chance){
      const eff = item.rawEffect;
      const debuffDef = DEBUFF_TYPES[eff.type];
      if(debuffDef){
        // 添加debuff
        const existing = G.debuffs.find(d=>d.type===eff.type);
        if(existing){
          existing.remaining = Math.max(existing.remaining, debuffDef.duration);
        } else {
          G.debuffs.push({type:eff.type, remaining:debuffDef.duration, source:item.name});
        }
        // 立即造成少量伤害
        const immDmg = randInt(2, 6);
        G.attrs.hp = Math.max(0, G.attrs.hp - immDmg);
        const effName = debuffDef.name;
        const effIcon = debuffDef.icon;
        logMsg += ` ${effIcon}${effName}！（体力-${immDmg}，持续${debuffDef.duration}小时）`;
        if(!G.furniture.includes('_cook') && G.raftLv >= 2) logMsg += '（💡建造厨灶可烹饪避免！）';
        poisoned = true;
      }
    }
    // 鱼类属性加成（中毒时不加成）
    if(item.bonusAttr && !poisoned){
      const bv = item.bonusVal || 1;
      if(item.bonusAttr === 'luck'){
        G.attrs.luck = Math.min(G.attrs.luckMax, G.attrs.luck + bv);
        logMsg += ` 🍀幸运+${bv}`;
      } else if(item.bonusAttr === 'int'){
        G.attrs.int += bv;
        logMsg += ` 🧠智力+${bv}`;
        checkIntTalent();
      } else {
        G.attrs[item.bonusAttr] += bv;
        const attrName = {hpMax:'体力上限',hungerMax:'饱腹上限',thirstMax:'水分上限'}[item.bonusAttr]||item.bonusAttr;
        logMsg += ` ⬆️${attrName}+${bv}`;
      }
    }
    addLog(logMsg, 'success');
  } else if(item.type === 'drink'){
    let thirst = item.thirst || 0;
    let stamina = item.stamina || 0;
    let hunger = item.hunger || 0;
    if(hasTalent('fast_metab')){stamina+=10;}
    // 珊瑚船减益：金属相关物品效果-20%
    if(G.flags.coralShipBonus && isMetalItem(id)){thirst=Math.floor(thirst*0.8);stamina=Math.floor(stamina*0.8);hunger=Math.floor(hunger*0.8);}
    removeItem(id);
    G.attrs.thirst = clamp(G.attrs.thirst + thirst, 0, G.attrs.thirstMax);
    G.attrs.hp = clamp(G.attrs.hp + stamina, 0, G.attrs.hpMax);
    G.attrs.hunger = clamp(G.attrs.hunger + hunger, 0, G.attrs.hungerMax);
    addLog(`💧 使用了 ${item.name}（水分${thirst>0?'+':''}${thirst} 体力${stamina>0?'+':''}${stamina}）`,'success');
  } else if(item.type === 'weapon'){
    removeItem(id);
    if(G.equipment?.weapon){
      addItem(G.equipment.weapon);
      addLog(`⚔️ 卸下 ${ITEMS[G.equipment.weapon].name} 放入背包，装备了 ${item.name}！`,'success');
    } else {
      addLog(`⚔️ 装备了 ${item.name}！`,'success');
      showToast('解锁武力值/精神值！');
    }
    G.equipment.weapon = id;
  } else if(item.type === 'shoes'){
    removeItem(id);
    if(G.equipment.shoes){
      addItem(G.equipment.shoes);
      addLog(`👢 卸下 ${ITEMS[G.equipment.shoes].name} 放入背包，装备了 ${item.name}！`,'success');
    } else {
      addLog(`👢 装备了 ${item.name}！`,'success');
    }
    G.equipment.shoes = id;
  } else if(item.type === 'gear'){
    removeItem(id);
    if(G.equipment.special){
      addItem(G.equipment.special);
      addLog(`📦 卸下 ${ITEMS[G.equipment.special].name} 放入背包，装备了 ${item.name}！`,'success');
    } else {
      addLog(`📦 装备了 ${item.name}！`,'success');
    }
    G.equipment.special = id;
  } else if(item.type === 'chest'){
    // 开启单个宝箱
    openChestSingle(id);
    return;
  } else if(item.type === 'special'){
    if(item.luckBonus){
      removeItem(id);
      G.attrs.luck += item.luckBonus;
      addLog(`🍀 使用了 ${item.name}，幸运值+${item.luckBonus}！`,'success');
    } else if(item.intBonus){
      removeItem(id);
      G.attrs.int += item.intBonus;
      addLog(`🧠 使用了 ${item.name}，智力+${item.intBonus}！`,'success');
      checkIntTalent();
    } else if(id === 'scuba'){
      removeItem(id);
      G.hasScuba = true;
      addLog('🤿 获得潜水装备！解锁水下探索！','event');
    }
  }
  renderAll();
  openInventory(); // 刷新面板
}

function eatBiscuit(amount){
  removeItem('compressed_biscuit');
  if(amount==='half'){
    G.attrs.hunger=clamp(G.attrs.hunger+12,0,G.attrs.hungerMax);
    G.attrs.hp=clamp(G.attrs.hp+1,0,G.attrs.hpMax);
    addLog('🍘 吃了半份压缩饼干');
  } else {
    G.attrs.hunger=clamp(G.attrs.hunger+25,0,G.attrs.hungerMax);
    G.attrs.thirst=clamp(G.attrs.thirst-5,0,G.attrs.thirstMax);
    G.attrs.hp=clamp(G.attrs.hp+3,0,G.attrs.hpMax);
