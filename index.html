function pickUpFromRaft(idx){
  const ri = G.onRaftItems[idx];
  if(!ri) return;
  const targetId = ri.id || ri;
  // 找出木筏上所有同类型物品的索引
  const sameIndices = [];
  G.onRaftItems.forEach((r, i) => { if((r.id||r) === targetId) sameIndices.push(i); });
  const count = sameIndices.length;
  // 检查背包空间
  if(getUsedSlots() >= G.maxSlots && !G.inventory[targetId]){
    showToast('背包已满！');return;
  }
  // 从后往前删除，避免索引偏移
  for(let i = sameIndices.length - 1; i >= 0; i--){
    G.onRaftItems.splice(sameIndices[i], 1);
  }
  addItem(targetId, count);
  addLog(`📦 将 ${ITEMS[targetId]?.name||targetId}×${count} 放入背包（保鲜！）`,'success');
  openInventory();
  renderAll();
}

// 木筏上的物品长按捡起（短按使用）
// 直接使用木筏上的物品
function useRaftItem(idx){
  const ri = G.onRaftItems[idx];
  if(!ri) return;
  const id = ri.id || ri;
  const item = ITEMS[id];
  if(!item) return;
  // 变质食物警告
  const spoil = getSpoilState(ri);
  if(spoil === 'spoiled' && (item.type === 'food' || item.type === 'drink')){
    if(!confirm('⚠️ 这份食物已经变质！食用可能导致严重负面效果，确认食用？')){
      return;
    }
  }
  // 食物/饮品/特殊物品可直接使用
  if(item.type === 'food' || item.type === 'drink' || (item.type === 'special' && (item.luckBonus || item.intBonus || id === 'scuba'))){
    G.onRaftItems.splice(idx, 1);
    if(spoil === 'spoiled' && (item.type === 'food' || item.type === 'drink')){
      // 变质食物：直接计算效果（不走useItem，避免正常加成）
      addItem(id);
      removeItem(id);
      const spoilDmg = randInt(8, 20);
      G.attrs.hp = Math.max(0, G.attrs.hp - spoilDmg);
      // 随机debuff
      const debuffTypes = ['weakness','diarrhea','poison','nerve'];
      const randDebuff = debuffTypes[randInt(0, debuffTypes.length-1)];
      const def = DEBUFF_TYPES[randDebuff];
      const existing = G.debuffs.find(d=>d.type===randDebuff);
      if(existing){existing.remaining=Math.max(existing.remaining,def.duration);}
      else{G.debuffs.push({type:randDebuff,remaining:def.duration,source:'变质'+item.name});}
      addLog(`🤮 食用了变质的${item.name}！体力-${spoilDmg}，${def.icon}${def.name}${def.duration}小时！`,'danger');
      closePanel();renderAll();saveGame();
      return;
    }
    // 正常使用（未变质）
    addItem(id);
    useItem(id);
    return;
  }
  // 武器可直接装备
  if(item.type === 'weapon'){
    G.onRaftItems.splice(idx, 1);
    addItem(id);
    useItem(id);
    return;
  }
  // 其他物品提示捡起
  showToast('此物品需捡起入背包后使用');
}

// ==================== 制作系统 ====================
function openCraft(craftTab){
  const body = document.getElementById('panelBody');
  const wbLv = G.workbenchLv;
  const currentTab = craftTab || 'all';
  let html = `<div class="panel-title">🔨 制作（工作台Lv.${wbLv}）<button class="panel-close" onclick="closePanel()">✕</button></div>`;

  // === 工作台升级预览（置顶） ===
  const wbUpgradeRecipes = RECIPES.filter(r => r.result === '_workbench_upgrade_2' || r.result === '_workbench_upgrade_3');
  const nextWbRecipe = wbUpgradeRecipes.find(r => {
    if(r.result === '_workbench_upgrade_2' && wbLv < 2) return true;
    if(r.result === '_workbench_upgrade_3' && wbLv < 3) return true;
    return false;
  });

  if(nextWbRecipe){
    const targetLv = nextWbRecipe.result === '_workbench_upgrade_2' ? 2 : 3;
    const canUpgrade = Object.entries(nextWbRecipe.materials).every(([id,n])=>itemCount(id)>=n);
    const matStr = Object.entries(nextWbRecipe.materials).map(([id,n])=>{
      const have = itemCount(id);
      const enough = have >= n;
      return `<span style="color:${enough?'#22c55e':'#ef4444'}">${ITEMS[id]?.icon||id} ${have}/${n}</span>`;
    }).join(' &nbsp;');

    const nextRecipes = RECIPES.filter(r => r.workbench === targetLv && !r.result.startsWith('_workbench'));
    const previewItems = nextRecipes.map(r => `${ITEMS[r.result]?.icon||'📦'}${r.name||ITEMS[r.result]?.name||r.result}`).join('、');

    html += `<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid #f59e0b44">
      <div style="font-size:13px;font-weight:700;color:#f59e0b;margin-bottom:4px">⬆️ 工作台升级至 Lv.${targetLv}</div>
      ${previewItems ? `<div style="font-size:11px;color:#f59e0b;margin-bottom:6px">🔓 解锁制作：${previewItems}</div>` : ''}
      <div style="font-size:12px;margin-bottom:6px">需要：${matStr}</div>
      <div class="event-choice${canUpgrade?'':' cant'}" style="text-align:center;font-weight:700" onclick="${canUpgrade?`craftItem('${nextWbRecipe.id}')`:''}">${canUpgrade?'🔨 立即升级工作台！':'材料不足...'}</div>
    </div>`;
  }

  // === 自由合成入口（置顶） ===
  html += `<div style="background:var(--bg-card);border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid var(--accent)33">
    <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:4px">🔧 自由合成</div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">选择2~4个材料自由组合，可能有意想不到的发现！</div>
    <div class="event-choice" style="text-align:center" onclick="openFreeCraft()">🔧 进入自由合成</div>
  </div>`;

  // === 配方分类标签 ===
  const currentRecipes = RECIPES.filter(r => r.workbench <= wbLv && !r.result.startsWith('_workbench_upgrade'));

  // 分类函数
  function getRecipeCategory(r){
    if(r.result.startsWith('_storage') || r.result.startsWith('_bed') || r.result.startsWith('_raincollect') || r.result.startsWith('_cook') || r.result.startsWith('_new_rod')) return 'furniture';
    if(r.result.startsWith('_workbench')) return 'upgrade';
    const item = ITEMS[r.result];
    if(!item) return 'other';
    if(item.type === 'weapon') return 'weapon';
    if(item.type === 'shoes' || item.type === 'gear') return 'armor';
    if(item.type === 'special') return 'armor';
    return 'other';
  }

  const categories = {
    all: currentRecipes,
    weapon: currentRecipes.filter(r => getRecipeCategory(r) === 'weapon'),
    armor: currentRecipes.filter(r => getRecipeCategory(r) === 'armor'),
    furniture: currentRecipes.filter(r => getRecipeCategory(r) === 'furniture'),
    other: currentRecipes.filter(r => getRecipeCategory(r) === 'other'),
  };

  const catLabels = [
    {id:'all', label:'📦 全部', count:categories.all.length},
    {id:'weapon', label:'⚔️ 武器', count:categories.weapon.length},
    {id:'armor', label:'🛡️ 防具', count:categories.armor.length},
    {id:'furniture', label:'🪑 家具', count:categories.furniture.length},
    {id:'other', label:'🔧 工具', count:categories.other.length},
  ];

  html += `<div style="display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none">`;
  catLabels.forEach(t => {
    if(t.count === 0 && t.id !== 'all') return;
    const active = currentTab === t.id;
    html += `<div onclick="openCraft('${t.id}')" style="flex-shrink:0;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid ${active?'var(--accent)':'var(--border)'};background:${active?'#1a2e3e':'var(--bg-card)'};color:${active?'var(--accent)':'var(--text-dim)'};font-weight:${active?'700':'400'}">${t.label} ${t.count}</div>`;
  });
  html += `</div>`;

  // === 渲染配方列表 ===
  const displayRecipes = categories[currentTab] || categories.all;

  // 分类名称映射
  const catNames = {weapon:'⚔️ 武器', armor:'🛡️ 防具', furniture:'🪑 家具', other:'🔧 工具'};

  if(currentTab === 'all'){
    // 全部标签下按分类分组显示
    const groupOrder = ['weapon','armor','furniture','other'];
    groupOrder.forEach(cat => {
      const group = categories[cat];
      if(group.length === 0) return;
      html += `<div style="font-size:12px;color:var(--accent);margin:8px 0 4px;font-weight:600">${catNames[cat]}</div>`;
      group.forEach(r => { html += renderRecipeItem(r); });
    });
  } else {
    displayRecipes.forEach(r => { html += renderRecipeItem(r); });
  }

  body.innerHTML = html;
  openPanel();
}

// 渲染单个配方项
function renderRecipeItem(r){
  const isWeaponRecipe = r.result && ITEMS[r.result]?.wclass;
  const canCraft = Object.entries(r.materials).every(([id,n])=>{
    const cost = (isWeaponRecipe && hasTalent('refine')) ? Math.max(1, Math.floor(n * 0.5)) : n;
    return itemCount(id) >= cost;
  });
  const matStr = Object.entries(r.materials).map(([id,n])=>{
    const have = itemCount(id);
    const cost = (isWeaponRecipe && hasTalent('refine')) ? Math.max(1, Math.floor(n * 0.5)) : n;
    const enough = have >= cost;
    return `<span style="color:${enough?'#22c55e':'#ef4444'}">${ITEMS[id]?.icon||id} ${have}/${cost}</span>`;
  }).join(' ');
  // 统一中文描述（替换英文ATK/MP等）
  const desc = (r.desc||'').replace(/ATK:(\d+)/g,'攻击:$1').replace(/MP:(\d+)/g,'精神:$1');
  // 分类色条
  let typeColor = 'var(--border)';
  if(r.result && ITEMS[r.result]?.type === 'weapon') typeColor = '#ef4444';
  else if(['shoes','gear','special'].includes(r.result && ITEMS[r.result]?.type)) typeColor = '#a855f7';
  else if(r.result?.startsWith('_')) typeColor = '#f59e0b';

  const displayName = r.name || ITEMS[r.result]?.name || r.result;
  return `<div class="craft-item${canCraft?'':' cant'}" onclick="${canCraft?`craftItem('${r.id}')`:''}" style="border-left:3px solid ${typeColor}">
    <div class="cr-name">${ITEMS[r.result]?.icon||'📦'} ${displayName} ${desc?'<span style="color:var(--text-dim);font-weight:400">— '+desc+'</span>':''}</div>
    <div class="cr-cost">需要：${matStr}</div>
  </div>`;
}

function craftItem(recipeId){
  const recipe = RECIPES.find(r=>r.id===recipeId);
  if(!recipe)return;
  // 先检查所有材料是否够（精炼术天赋减免）
  const isWeaponRecipe2 = recipe.result && ITEMS[recipe.result]?.wclass;
  for(const [id,n] of Object.entries(recipe.materials)){
    const cost = (isWeaponRecipe2 && hasTalent('refine')) ? Math.max(1, Math.floor(n * 0.5)) : n;
    if(itemCount(id) < cost){showToast('材料不足！');return;}
  }
  // 确认够后再扣除（精炼术天赋：武器类合成材料消耗-50%）
  const isWeaponRecipe = recipe.result && ITEMS[recipe.result]?.wclass;
  Object.entries(recipe.materials).forEach(([id,n])=>{
    const cost = (isWeaponRecipe && hasTalent('refine')) ? Math.max(1, Math.floor(n * 0.5)) : n;
    removeItem(id, cost);
  });
  // 产出
  const result = recipe.result;
  if(result.startsWith('_')){
    // 特殊制作结果
    handleSpecialCraft(result);
  } else {
    // 品质判定
    const wclass = ITEMS[result]?.wclass;
    let quality = '普通';
    if(wclass){
      const mastery = G.weaponMastery[wclass]||0;
      const needleBonus = G.flags?.boneNeedle ? 10 : 0; // 骨针加成
      const qRoll = Math.random()*100;
      if(mastery>=81 && qRoll<1+needleBonus*0.1) quality='神话';
      else if(mastery>=61 && qRoll<4+needleBonus*0.5) quality='传说';
      else if(mastery>=41 && qRoll<14+needleBonus) quality='黄金';
      else if(mastery>=21 && qRoll<39+needleBonus) quality='白银';
      // 熟练度增长
      G.weaponMastery[wclass] = Math.min(100, (G.weaponMastery[wclass]||0) + randInt(3,5));
      addLog(`🔨 制作了 ${quality}品质的 ${ITEMS[result].name}！（${wclass}熟练度+3~5）`,'success');
    } else {
      addLog(`🔨 制作了 ${ITEMS[result]?.name||result}！`,'success');
    }
    if(getUsedSlots() < G.maxSlots || G.inventory[result]){
      addItem(result);
    } else {
      G.onRaftItems.push({id:result,placedHour:G.day*24+G.hour});
      addLog('背包满了，物品放在木筏上','warn');
    }
  }
  closePanel();
  renderAll();
}

// ==================== 烹饪系统 ====================

  const body = document.getElementById('panelBody');
  const cookLvNames = ['无','简易厨灶','厨房','高级厨房'];
  const cookExpNext = [0,50,150,999999];

  let html = `<div class="panel-title">🍳 烹饪（${cookLvNames[G.cookLv]}）<button class="panel-close" onclick="closePanel()">✕</button></div>`;
  html += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">烹饪等级 Lv.${G.cookLv} · 经验 ${G.cookExp}/${cookExpNext[G.cookLv]}</div>`;

  // 下级厨灶解锁预览
  if(G.cookLv < 3){
    const nextLv = G.cookLv + 1;
    const nextRecipes = COOK_RECIPES.filter(r => r.cookLv === nextLv);
    const nextName = cookLvNames[nextLv];
    if(nextRecipes.length > 0){
      const previewItems = nextRecipes.map(r => `${ITEMS[r.result]?.icon||'🍽️'}${r.name}`).join('、');
      html += `<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid #f59e0b44">
        <div style="font-size:13px;font-weight:700;color:#f59e0b;margin-bottom:4px">🔓 ${nextName}解锁（需木筏Lv.${nextLv+2}）</div>
        <div style="font-size:11px;color:#f59e0b">${previewItems}</div>
      </div>`;
    }
  }

  // 可用配方
  const available = COOK_RECIPES.filter(r => r.cookLv <= G.cookLv);

  // 分类标签
  const catGroups = {
    all: available,
    basic: available.filter(r => !r.ingredients.pufferfish && !r.ingredients.swordfish_meat && !r.ingredients.tuna && !r.ingredients.salmon && !r.ingredients.eel_meat && !r.ingredients.whale_steak && !r.ingredients.shark_fin),
    special: available.filter(r => r.ingredients.pufferfish || r.ingredients.swordfish_meat || r.ingredients.tuna || r.ingredients.salmon || r.ingredients.eel_meat || r.ingredients.whale_steak || r.ingredients.shark_fin),
  };

  const catLabels = [
    {id:'all', label:'📋 全部', count:catGroups.all.length},
    {id:'basic', label:'🐟 基础料理', count:catGroups.basic.length},
    {id:'special', label:'⭐ 珍稀料理', count:catGroups.special.length},
  ];

  html += `<div style="display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none">`;
  catLabels.forEach(t => {
    if(t.count === 0 && t.id !== 'all') return;
    const active = currentTab === t.id;
    html += `<div onclick="openCook('${t.id}')" style="flex-shrink:0;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid ${active?'var(--accent)':'var(--border)'};background:${active?'#1a2e3e':'var(--bg-card)'};color:${active?'var(--accent)':'var(--text-dim)'};font-weight:${active?'700':'400'}">${t.label} ${t.count}</div>`;
  });
  html += `</div>`;

  // === 自由烹饪入口 ===
  html += `<div style="background:var(--bg-card);border-radius:8px;padding:10px;margin-bottom:10px;border:1px solid #22c55e33">
    <div style="font-size:13px;font-weight:700;color:#22c55e;margin-bottom:4px">🧪 自由烹饪</div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">自由组合食材，可能发现新菜谱！</div>
    <div class="event-choice" style="text-align:center" onclick="openFreeCook()">🧪 进入自由烹饪</div>
  </div>`;

  const displayRecipes = catGroups[currentTab] || catGroups.all;

  // 按 cookLv 分组显示
  const lvNames = {1:'简易厨灶', 2:'厨房', 3:'高级厨房'};
  const lvIcons = {1:'🫕', 2:'🍳', 3:'👨‍🍳'};
  const grouped = {};
  displayRecipes.forEach(r => {
    if(!grouped[r.cookLv]) grouped[r.cookLv] = [];
    grouped[r.cookLv].push(r);
  });

    html += `<div style="font-size:12px;color:var(--accent);margin:8px 0 4px;font-weight:600">${lvIcons[lv]||'🍳'} ${lvNames[lv]||'Lv.'+lv} 配方（${grouped[lv].length}）</div>`;
    grouped[lv].forEach(r => {
      const hasAll = Object.entries(r.ingredients).every(([id,n])=>itemCount(id)>=n);
      const matStr = Object.entries(r.ingredients).map(([id,n])=>{
        const have = itemCount(id);
        return `<span style="color:${have>=n?'#22c55e':'#ef4444'}">${ITEMS[id]?.icon||id}${have}/${n}</span>`;
      }).join(' ');
      const learned = G.cookMastery[r.id];
      const isSpecial = r.ingredients.pufferfish || r.ingredients.swordfish_meat || r.ingredients.tuna || r.ingredients.salmon || r.ingredients.eel_meat || r.ingredients.whale_steak || r.ingredients.shark_fin;
      html += `<div class="craft-item${hasAll?'':' cant'}" onclick="${hasAll?`doCook('${r.id}')`:''}" style="${learned?'border-left:3px solid #22c55e':isSpecial?'border-left:3px solid #f59e0b':''}">
        <div class="cr-name">${ITEMS[r.result]?.icon||'🍽️'} ${r.name} ${learned?'<span style="color:#22c55e;font-size:10px">✓已学</span>':''} ${isSpecial?'<span style="color:#f59e0b;font-size:10px">⭐珍稀</span>':''}</div>
        <div class="cr-cost">需要：${matStr} · 经验+${r.exp}</div>
      </div>`;
    });
  });

  // 已学会的菜谱
  const learnedRecipes = Object.keys(G.cookMastery);
  if(learnedRecipes.length > 0){
    html += `<div style="font-size:12px;color:var(--accent);margin:10px 0 6px">📖 已学会菜谱（${learnedRecipes.length}）</div>`;
    learnedRecipes.forEach(rid => {
      const recipe = COOK_RECIPES.find(r=>r.id===rid);
      if(recipe){
        html += `<div style="font-size:11px;padding:3px 6px;background:var(--bg-card);border-radius:4px;margin-bottom:3px">${ITEMS[recipe.result]?.icon||'🍽️'} ${recipe.name} — ${ITEMS[recipe.result]?.desc||''}</div>`;
      }
    });
  }

  body.innerHTML = html;
  openPanel();
}

function doCook(recipeId){
  const recipe = COOK_RECIPES.find(r=>r.id===recipeId);
  if(!recipe){showToast('配方不存在！');return;}
  if(recipe.cookLv > G.cookLv){showToast('厨灶等级不足！');return;}

  // 检查食材
  for(const [id,n] of Object.entries(recipe.ingredients)){
    if(itemCount(id) < n){showToast('食材不足！');return;}
  }

  // 扣除食材
  for(const [id,n] of Object.entries(recipe.ingredients)){
    removeItem(id, n);
  }

  // 烹饪成功率：基础70% + 每10点经验+5%，最高95%
  const bonusRate = Math.min(25, Math.floor(G.cookExp / 10) * 5);
  const successRate = Math.min(95, 70 + bonusRate);
  const success = Math.random() * 100 < successRate;

  if(success){
    G.cookExp += recipe.exp;
    G.cookMastery[recipe.id] = true;
    G.codex.cook[recipe.id] = true;
    const item = ITEMS[recipe.result];
    // 烹饪产出也记录到图鉴
    if(recipe.result && item){
      if(!G.codex.cook['_items']) G.codex.cook['_items'] = {};
      G.codex.cook['_items'][recipe.result] = {name:item.name, icon:item.icon, firstDay:G.day};
    }
    // 烹饪经验升级检查
    const cookExpNext = [0,50,150,999999];
    if(G.cookLv < 3 && G.cookExp >= cookExpNext[G.cookLv]){
      addLog('🍳 烹饪经验已满，但需要升级木筏来提升厨灶等级！','event');
    }
    // 展示成果面板，让玩家选择使用或放入背包
    showCookResult(recipe.result, recipe.exp);
  } else {
    // 失败 - 焦糊食物也展示选择
    G.cookExp += Math.max(1, Math.floor(recipe.exp * 0.2));
    showCookResult('burnt_food', Math.max(1, Math.floor(recipe.exp * 0.2)), true);
  }
}

// 展示烹饪成果面板
function showCookResult(resultId, exp, failed){
  const item = ITEMS[resultId];
  const body = document.getElementById('panelBody');
  let html = `<div class="panel-title">🍳 烹饪${failed?'失败':'完成'}！<button class="panel-close" onclick="cookResultDiscard()">✕</button></div>`;

  html += `<div style="text-align:center;padding:16px 0">`;
  html += `<div style="font-size:48px;margin-bottom:8px">${item?.icon||'🍽️'}</div>`;
  html += `<div style="font-size:16px;font-weight:700;color:${failed?'var(--text-warn)':'var(--success)'}">${item?.name||'未知料理'}</div>`;
  if(item?.desc) html += `<div style="font-size:12px;color:var(--text-dim);margin-top:4px">${item.desc}</div>`;

  // 显示属性
  if(item){
    const parts = [];
    if(item.hunger) parts.push(`饱腹${item.hunger>0?'+':''}${item.hunger}`);
    if(item.thirst) parts.push(`水分${item.thirst>0?'+':''}${item.thirst}`);
    if(item.stamina) parts.push(`体力+${item.stamina}`);
    if(item.bonusAttr){
      const attrName = {hpMax:'体力上限',hungerMax:'饱腹上限',thirstMax:'水分上限',luck:'幸运',int:'智力'}[item.bonusAttr]||item.bonusAttr;
      parts.push(`${attrName}+${item.bonusVal}`);
    }
    if(parts.length) html += `<div style="font-size:12px;color:var(--accent);margin-top:6px">${parts.join(' · ')}</div>`;
  }

  html += `<div style="font-size:11px;color:var(--text-dim);margin-top:6px">经验+${exp}</div>`;
  html += `</div>`;

  // 操作按钮
  html += `<div style="display:flex;gap:8px;margin-top:8px">`;
  if(!failed && item && (item.type === 'food' || item.type === 'drink')){
    html += `<div class="event-choice" style="flex:1;text-align:center" onclick="cookResultUse('${resultId}')">🍽️ 直接食用</div>`;
  }
  html += `<div class="event-choice" style="flex:1;text-align:center" onclick="cookResultStash('${resultId}')">📦 放入背包</div>`;
  html += `</div>`;
  html += `<div class="event-choice" style="text-align:center;margin-top:6px;color:var(--text-dim)" onclick="cookResultDiscard()">🗑️ 丢弃</div>`;

  // 暂存成果（不放入背包）
  window._cookPendingResult = resultId;

  body.innerHTML = html;
  // 不关闭面板，让玩家选择
  openPanel();
  renderAll();
  saveGame();
}

// 直接食用烹饪成果
function cookResultUse(resultId){
  const item = ITEMS[resultId];
  if(!item){cookResultDiscard();return;}
  // 直接使用（和 useItem 逻辑类似，但不会中毒因为已烹饪）
  let hunger = item.hunger || 0;
  let thirst = item.thirst || 0;
  let stamina = item.stamina || 0;
  if(G.furniture.includes('_cook')){hunger=Math.floor(hunger*1.3);stamina=Math.floor(stamina*1.3);}
  if(hasTalent('iron_stomach')){hunger=Math.floor(hunger*1.2);}
  if(hasTalent('fast_metab')){stamina+=10;}
  G.attrs.hunger = clamp(G.attrs.hunger + hunger, 0, G.attrs.hungerMax);
  G.attrs.thirst = clamp(G.attrs.thirst + thirst, 0, G.attrs.thirstMax);
  G.attrs.hp = clamp(G.attrs.hp + stamina, 0, G.attrs.hpMax);
  let logMsg = `🍽️ 直接享用了 ${item.name}（饱腹${hunger>0?'+':''}${hunger} 水分${thirst>0?'+':''}${thirst} 体力${stamina>0?'+':''}${stamina}）`;
  // 属性加成
  if(item.bonusAttr){
    const bv = item.bonusVal || 1;
    if(item.bonusAttr === 'luck'){
      G.attrs.luck = Math.min(G.attrs.luckMax, G.attrs.luck + bv);
      logMsg += ` 🍀幸运+${bv}`;
    } else if(item.bonusAttr === 'int'){
      G.attrs.int += bv;
      logMsg += ` 🧠智力+${bv}`;
      checkIntTalent();
    } else {
      G.attrs[item.bonusAttr] += bv;
      const attrName = {hpMax:'体力上限',hungerMax:'饱腹上限',thirstMax:'水分上限'}[item.bonusAttr]||item.bonusAttr;
      logMsg += ` ⬆️${attrName}+${bv}`;
    }
  }
  addLog(logMsg, 'success');
  window._cookPendingResult = null;
  closePanel();
  renderAll();
  saveGame();
}

// 放入背包
function cookResultStash(resultId){
  if(getUsedSlots() < G.maxSlots || G.inventory[resultId]){
    addItem(resultId);
    addLog(`📦 ${ITEMS[resultId]?.icon||''} ${ITEMS[resultId]?.name||resultId} 已放入背包`,'success');
  } else {
    G.onRaftItems.push({id:resultId,placedHour:G.day*24+G.hour});
    addLog('背包满了，成品放在木筏上','warn');
  }
  window._cookPendingResult = null;
  closePanel();
  renderAll();
  saveGame();
}

// 丢弃
function cookResultDiscard(){
  if(window._cookPendingResult){
    addLog(`🗑️ 丢弃了 ${ITEMS[window._cookPendingResult]?.name||'食物'}`,'warn');
    window._cookPendingResult = null;
  }
  closePanel();
  renderAll();
  saveGame();
}

function openFreeCook(){
  freeCookSlots = [null, null, null];
  renderFreeCook();
}

function renderFreeCook(){
  const body = document.getElementById('panelBody');
  let html = `<div class="panel-title">🧪 自由烹饪<button class="panel-close" onclick="closePanel()">✕</button></div>`;
  html += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">选择2~3种食材自由组合，可能发现新菜谱！</div>`;

  // 食材槽位
  html += `<div style="display:flex;gap:6px;margin-bottom:12px;justify-content:center">`;
  for(let i=0;i<3;i++){
    const slot = freeCookSlots[i];
    if(slot){
      const item = ITEMS[slot];
      html += `<div class="craft-item" style="text-align:center;min-width:70px;cursor:pointer" onclick="freeCookRemoveSlot(${i})">
        <div style="font-size:22px">${item?.icon||'❓'}</div>
        <div style="font-size:10px">${item?.name||slot}</div>
      </div>`;
    } else {
      html += `<div style="border:2px dashed var(--border);border-radius:8px;padding:14px 10px;min-width:70px;text-align:center;color:var(--text-dim);font-size:11px">${i<2?'必选':'可选'}</div>`;
    }
  }
  html += `</div>`;

  // 烹饪按钮
  const filled = freeCookSlots.filter(s=>s);
  const canCook = filled.length >= 2;
  html += `<div class="event-choice${canCook?'':' cant'}" style="text-align:center;margin-bottom:12px" onclick="${canCook?'doFreeCook()':''}">🧪 尝试烹饪（${filled.length}/3 食材）</div>`;

  // 可选食材
  const foodItems = Object.keys(G.inventory).filter(id => {
    if(G.inventory[id] <= 0) return false;
    const item = ITEMS[id];
    return item && (item.type === 'food' || item.type === 'drink') && item.raw;
  });
  // 也允许非raw食物参与
  const extraItems = Object.keys(G.inventory).filter(id => {
    if(G.inventory[id] <= 0 || foodItems.includes(id)) return false;
    const item = ITEMS[id];
    return item && (item.type === 'food' || item.type === 'drink');
  });
  const allFood = [...foodItems, ...extraItems];

  if(allFood.length > 0){
    html += `<div style="font-size:12px;color:var(--accent);margin-bottom:6px">📦 选择食材</div>`;
    allFood.forEach(id => {
      const item = ITEMS[id];
      let usedCount = 0;
      freeCookSlots.forEach(s => { if(s === id) usedCount++; });
      const available = G.inventory[id] - usedCount;
      if(available > 0){
        const isRaw = item.raw;
        html += `<div class="craft-item" onclick="freeCookSelect('${id}')" style="${isRaw?'border-left:3px solid #22c55e':''}">
          <div class="cr-name">${item.icon} ${item.name} <span style="color:var(--text-dim)">×${available}</span> ${isRaw?'<span style="color:#22c55e;font-size:10px">生食</span>':''}</div>
        </div>`;
      }
    });
  }

  // 已发现的自由菜谱
  const discovered = Object.keys(G.freeCookDiscovered || {});
  if(discovered.length > 0){
    html += `<div style="font-size:12px;color:var(--accent);margin:10px 0 6px">🧪 已发现自由菜谱（${discovered.length}）</div>`;
    discovered.forEach(key => {
      const rule = FREE_COOK_RULES[key] || G.freeCookDiscovered[key];
      if(rule){
        const parts = [];
        if(rule.hunger) parts.push(`饱腹+${rule.hunger}`);
        if(rule.thirst) parts.push(`水分+${rule.thirst}`);
        if(rule.stamina) parts.push(`体力+${rule.stamina}`);
        html += `<div style="font-size:11px;padding:3px 6px;background:var(--bg-card);border-radius:4px;margin-bottom:3px">${rule.icon||'🍽️'} ${rule.name} — ${parts.join(' ')}</div>`;
      }
    });
  }

  body.innerHTML = html;
  openPanel();
}

function freeCookSelect(id){
  for(let i=0;i<3;i++){
    if(!freeCookSlots[i]){freeCookSlots[i]=id;renderFreeCook();return;}
  }
  freeCookSlots[2] = id;
  renderFreeCook();
}

function freeCookRemoveSlot(idx){
  freeCookSlots[idx] = null;
  const filled = freeCookSlots.filter(s=>s);
  while(filled.length < 3) filled.push(null);
  freeCookSlots = filled;
  renderFreeCook();
}

function doFreeCook(){
  const filled = freeCookSlots.filter(s=>s);
  if(filled.length < 2){showToast('请至少选择2种食材！');return;}

  // 验证食材数量
  const needed = {};
  filled.forEach(id => {needed[id]=(needed[id]||0)+1;});
  for(const [id,n] of Object.entries(needed)){
    if(itemCount(id) < n){showToast('食材不足！');return;}
  }
  // 扣除食材
  for(const [id,n] of Object.entries(needed)){
    removeItem(id, n);
  }

  // 查找匹配规则
  const sorted = [...filled].sort();
  const key2 = sorted.slice(0,2).join('+');
  const key3 = sorted.join('+');
  const rule = FREE_COOK_RULES[key3] || FREE_COOK_RULES[key2];

  // 熟练度加成
  const masteryBonus = Math.min(20, Math.floor(G.cookExp / 20) * 5);
  const successRate = Math.min(90, 60 + masteryBonus);

  if(rule){
    const success = Math.random() * 100 < (rule.chance * 100 + masteryBonus);
    if(success){
      G.cookExp += rule.exp;
      if(!G.freeCookDiscovered) G.freeCookDiscovered = {};
      const ruleKey = key3 === key2 ? key2 : key3;
      G.freeCookDiscovered[ruleKey] = rule;
      G.codex.cook['_free_'+rule.name] = {name:rule.name, icon:rule.icon, firstDay:G.day};

      // 展示成果
      const dish = {
        id: '_freecook_'+Date.now(),
        name: rule.name,
        icon: rule.icon,
        hunger: rule.hunger, thirst: rule.thirst, stamina: rule.stamina,
        bonusAttr: rule.bonusAttr, bonusVal: rule.bonusVal,
        type: 'food', desc: '自由烹饪发现的菜谱'
      };
      // 临时注册到ITEMS以便展示
      ITEMS[dish.id] = dish;
      showCookResult(dish.id, rule.exp, false, dish);
    } else {
      G.cookExp += Math.max(1, Math.floor(rule.exp * 0.2));
      showCookResult('burnt_food', Math.max(1, Math.floor(rule.exp * 0.2)), true);
    }
  } else {
    // 未知组合：小概率惊喜
    G.cookExp += 2;
    if(Math.random() < 0.15 + masteryBonus * 0.002){
      // 生成随机料理
      const randomDish = generateRandomDish(filled);
      if(!G.freeCookDiscovered) G.freeCookDiscovered = {};
      G.freeCookDiscovered['random_'+Date.now()] = randomDish;
      ITEMS[randomDish.id] = randomDish;
      G.cookExp += randomDish.exp || 5;
      showCookResult(randomDish.id, randomDish.exp || 5, false, randomDish);
      addLog('🧪 自由烹饪发现了新菜谱！','event');
    } else {
      showCookResult('burnt_food', 2, true);
    }
  }
}

// 生成随机自由烹饪料理
function generateRandomDish(ingredients){
  const totalHunger = ingredients.reduce((s,id) => s + (ITEMS[id]?.hunger||5), 0);
  const icons = ['🍽️','🥘','🍲','🥗','🍱','🥣','🍛','🧆'];
  const adjectives = ['秘制','独特','奇妙','神秘','海洋','热带','古法','飘香'];
  const suffixes = ['杂烩','炖锅','风味','煲','拼盘','烧','煮','料理'];
  const name = adjectives[randInt(0,adjectives.length-1)] + suffixes[randInt(0,suffixes.length-1)];
  const hunger = Math.floor(totalHunger * (0.8 + Math.random()*0.5));
  const thirst = randInt(0, 8);
  const stamina = Math.floor(totalHunger * 0.4);
  const bonusAttrs = ['hpMax','hungerMax','thirstMax','luck','int'];
  const hasBonus = Math.random() < 0.4;
  return {
    id: 'freecook_'+Date.now()+'_'+randInt(0,999),
    name: name,
    icon: icons[randInt(0,icons.length-1)],
    type: 'food',
    hunger: hunger, thirst: thirst, stamina: stamina,
    bonusAttr: hasBonus ? bonusAttrs[randInt(0,bonusAttrs.length-1)] : undefined,
    bonusVal: hasBonus ? randInt(1,3) : undefined,
    desc: '自由烹饪的意外之作',
    exp: Math.floor(hunger * 0.5)
  };
}

// 自由烹饪结果：直接食用
function freeCookEat(resultId, dishData){
  const item = dishData || ITEMS[resultId];
  if(!item){cookResultDiscard();return;}
  let hunger = item.hunger || 0;
  let thirst = item.thirst || 0;
  let stamina = item.stamina || 0;
  if(G.furniture.includes('_cook')){hunger=Math.floor(hunger*1.3);stamina=Math.floor(stamina*1.3);}
  if(hasTalent('iron_stomach')){hunger=Math.floor(hunger*1.2);}
  if(hasTalent('fast_metab')){stamina+=10;}
  G.attrs.hunger = clamp(G.attrs.hunger + hunger, 0, G.attrs.hungerMax);
  G.attrs.thirst = clamp(G.attrs.thirst + thirst, 0, G.attrs.thirstMax);
  G.attrs.hp = clamp(G.attrs.hp + stamina, 0, G.attrs.hpMax);
  let logMsg = `🍽️ 直接享用了 ${item.name}（饱腹+${hunger} 水分+${thirst} 体力+${stamina}）`;
  if(item.bonusAttr){
    const bv = item.bonusVal || 1;
    if(item.bonusAttr === 'luck'){G.attrs.luck=Math.min(G.attrs.luckMax,G.attrs.luck+bv);logMsg+=` 🍀幸运+${bv}`;}
    else if(item.bonusAttr === 'int'){G.attrs.int+=bv;logMsg+=` 🧠智力+${bv}`;checkIntTalent();}
    else{G.attrs[item.bonusAttr]+=bv;const n={hpMax:'体力上限',hungerMax:'饱腹上限',thirstMax:'水分上限'}[item.bonusAttr]||item.bonusAttr;logMsg+=` ⬆️${n}+${bv}`;}
  }
  addLog(logMsg,'success');
  window._cookPendingResult = null;
  window._cookPendingDish = null;
  closePanel();renderAll();saveGame();
}

// ==================== 自由合成系统 ====================
let freeCraftSlots = [null, null, null, null];

function openFreeCraft(){
  freeCraftSlots = [null, null, null, null];
  renderFreeCraft();
}

function renderFreeCraft(){
  const body = document.getElementById('panelBody');
  let html = `<div class="panel-title">🔧 自由合成<button class="panel-close" onclick="closePanel()">✕</button></div>`;
  html += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">选择2~4个材料尝试组合，材料越多可能越稀有！</div>`;

  // 材料槽位
  html += `<div style="display:flex;gap:6px;margin-bottom:12px;justify-content:center;flex-wrap:wrap">`;
  for(let i=0;i<4;i++){
    const slot = freeCraftSlots[i];
    if(slot){
      const item = ITEMS[slot];
      html += `<div class="craft-item" style="text-align:center;min-width:70px;cursor:pointer" onclick="freeCraftRemoveSlot(${i})">
        <div style="font-size:22px">${item?.icon||'❓'}</div>
        <div style="font-size:10px">${item?.name||slot}</div>
      </div>`;
    } else {
      html += `<div style="border:2px dashed var(--border);border-radius:8px;padding:14px 10px;min-width:70px;text-align:center;color:var(--text-dim);font-size:11px">${i<2?'必选':'可选'}</div>`;
    }
  }
  html += `</div>`;

  // 合成按钮
  const filledCount = freeCraftSlots.filter(s=>s).length;
  const canCraft = filledCount >= 2;
  html += `<div class="event-choice${canCraft?'':' cant'}" style="text-align:center;margin-bottom:12px" onclick="${canCraft?'doFreeCraft()':''}">🔨 尝试合成（${filledCount}/4 材料）</div>`;

  // 可选材料列表
  const materials = Object.keys(G.inventory).filter(id => G.inventory[id] > 0 && ITEMS[id] && (ITEMS[id].type==='material' || ITEMS[id].type==='food'));
  if(materials.length > 0){
    html += `<div style="font-size:12px;color:var(--accent);margin-bottom:6px">📦 选择材料</div>`;
    materials.forEach(id => {
      const item = ITEMS[id];
      // 计算已放入槽位的数量
      let usedCount = 0;
      freeCraftSlots.forEach(s => { if(s === id) usedCount++; });
      const available = G.inventory[id] - usedCount;
      if(available > 0){
        html += `<div class="craft-item" onclick="freeCraftSelect('${id}')">
          <div class="cr-name">${item.icon} ${item.name} <span style="color:var(--text-dim)">×${available}</span></div>
        </div>`;
      }
    });
  }

  // 已合成记录
  const craftedKeys = Object.keys(G.craftedItems||{});
  if(craftedKeys.length > 0){
    html += `<div style="font-size:12px;color:var(--accent);margin:10px 0 6px">📝 合成记录</div>`;
    craftedKeys.forEach(id => {
      const item = ITEMS[id];
      if(item) html += `<div style="font-size:11px;padding:3px 6px;background:var(--bg-card);border-radius:4px;margin-bottom:3px">${item.icon} ${item.name} ×${G.craftedItems[id]}</div>`;
    });
  }

  body.innerHTML = html;
  openPanel();
}

function freeCraftSelect(id){
  // 找第一个空槽，最多4个
  let placed = false;
  for(let i=0;i<4;i++){
    if(!freeCraftSlots[i]){freeCraftSlots[i]=id;placed=true;break;}
  }
  if(!placed){
    // 4个都满了，替换最后一个
    freeCraftSlots[3] = id;
  }
  renderFreeCraft();
}

function freeCraftRemoveSlot(idx){
  freeCraftSlots[idx] = null;
  // 压缩空槽到后面
  const filled = freeCraftSlots.filter(s=>s);
  while(filled.length < 4) filled.push(null);
  freeCraftSlots = filled;
  renderFreeCraft();
}

function doFreeCraft(){
  const filled = freeCraftSlots.filter(s=>s);
  if(filled.length < 2){showToast('请至少选择2个材料！');return;}

  // 验证材料数量
  const needed = {};
  filled.forEach(id => {needed[id] = (needed[id]||0) + 1;});
  for(const [id,n] of Object.entries(needed)){
    if(itemCount(id) < n){showToast('材料不足！');return;}
  }

  // 扣除材料
  for(const [id,n] of Object.entries(needed)){
    removeItem(id, n);
  }

  // 多材料合成：优先尝试所有2-材料组合，然后3-材料，然后4-材料
  let rule = null;
  let matchedKey = null;

  // 尝试2材料组合（所有可能的两两配对）
  for(let i=0;i<filled.length && !rule;i++){
    for(let j=i+1;j<filled.length && !rule;j++){
      const a=filled[i], b=filled[j];
      const k1 = a<b?a+'+'+b:b+'+'+a;
      const k2 = a+'+'+b;
      const k3 = b+'+'+a;
      const r = FREE_CRAFT_RULES[k1] || FREE_CRAFT_RULES[k2] || FREE_CRAFT_RULES[k3];
      if(r){rule=r;matchedKey=k1;}
    }
  }

  // 多材料加成：材料越多，成功率越高，且可能升级结果
  const matCount = filled.length;
  const bonusChance = (matCount - 2) * 0.1; // 3材料+10%，4材料+20%

  if(rule){
    const effectiveChance = Math.min(0.95, rule.chance + bonusChance);
    const success = Math.random() < effectiveChance;
    if(success){
      // 4材料有小概率升级结果
      let finalResult = rule.result;
      if(matCount >= 4 && Math.random() < 0.2){
        const upgrades = {'rope':'cloth','tool':'metal_scrap','metal_block':'gear','vine':'rope','fish_spear':'bone_dagger','bone_dagger':'iron_sword','amulet':'pearl'};
        if(upgrades[finalResult]){
          finalResult = upgrades[finalResult];
          addLog('✨ 材料加成！合成结果升级了！','event');
        }
      }
      if(getUsedSlots() < G.maxSlots || G.inventory[finalResult]){
        addItem(finalResult);
      } else {
        G.onRaftItems.push({id:finalResult,placedHour:G.day*24+G.hour});
        addLog('背包满了，成品放在木筏上','warn');
      }
      G.craftedItems[finalResult] = (G.craftedItems[finalResult]||0) + 1;
      G.codex.craft[finalResult] = true;
      const resultItem = ITEMS[finalResult];
      addLog(`🔧 自由合成成功！${rule.name}→${resultItem?.icon||''} ${resultItem?.name||finalResult}！`,'success');
    } else {
      addLog(`🔧 自由合成失败...${rule.name}没有成功`,'warn');
    }
  } else {
    // 未知组合：材料越多惊喜概率越高
    const surpriseChance = 0.1 + (matCount - 2) * 0.05;
    if(Math.random() < surpriseChance){
      const surprisePool = matCount >= 4 ? ['pearl','deep_crystal','coral','circuit','gear'] : ['pearl','deep_crystal','coral'];
      const surprise = surprisePool[randInt(0, surprisePool.length-1)];
      addItem(surprise);
      G.codex.craft[surprise] = true;
      addLog(`✨ 未知组合产生了意想不到的结果！获得 ${ITEMS[surprise].icon} ${ITEMS[surprise].name}！`,'success');
    } else {
      addLog('🔧 这些材料似乎无法组合...','warn');
    }
  }

  freeCraftSlots = [null, null, null, null];
  closePanel();
  renderAll();
  saveGame();
}

function buildBioShip(shipId){
  const ship = BIO_SHIPS.find(s=>s.id===shipId);
  if(!ship) return;
  // 检查材料
  for(const [id,n] of Object.entries(ship.materials)){
    if(itemCount(id)<n){showToast('材料不足！');return;}
  }
  // 扣除材料
  for(const [id,n] of Object.entries(ship.materials)){removeItem(id,n);}
  // 应用效果
  ship.apply();
  G.raftLv = 4; // 生物船相当于Lv4
  G.maxSlots = Math.max(G.maxSlots, ship.size * 2 + 4);
  G.raftHp = G.raftHpMax || 100;
  addLog(`${ship.icon} 建造了${ship.name}！${ship.buffs[0]}，${ship.debuffs[0]}`,'event');
  showToast(`🧬 ${ship.name}建成！查看增益/减益`);
  closePanel();
  renderAll();
  saveGame();
}

function upgradeRaft(lv){
  const rl = RAFT_LEVELS[lv - 1];
  if(!rl) return;
  // 先检查所有材料是否够
  const mats = Object.entries(rl.materials);
  for(const [id,n] of mats){
    if(itemCount(id) < n){
      showToast('材料不足！');return;
    }
  }
  // 确认够后再扣除
  for(const [id,n] of mats){ removeItem(id, n); }
  G.raftLv = lv;
  G.raftHp = G.raftHpMax || 100;
  // 木筏升级增加储物格子：Lv1=10格, Lv2=14格, Lv3=18格, Lv4=22格, Lv5=26格
  const slotsPerLevel = [10, 10, 14, 18, 22, 26];
  const oldSlots = G.maxSlots;
  G.maxSlots = slotsPerLevel[lv] || 10;
  const added = G.maxSlots - oldSlots;
  addLog(`🏗️ 木筏升级至 Lv.${lv} ${rl.name}！储物空间${added>0?'+'+added+'格':''}（当前${G.maxSlots}格）`,'success');
  if(lv>=3){showToast('庇护所已建成，夜间安全！');G.cookLv=1;G.craftLv=1;addLog('🍳 解锁简易厨灶！','success');if(!G.furniture.includes('_bed2')){G.furniture.push('_bed2');addLog('🛏️ 自动安装舒适大床，休息恢复+25！','success');}}
  if(lv>=4){showToast('可以主动移动了！');G.cookLv=2;G.craftLv=2;addLog('🍳 厨灶升级为厨房！','success');}
  if(lv>=5){G.cookLv=3;G.craftLv=3;addLog('🍳 厨灶升级为高级厨房！','success');}
  closePanel();
  renderAll();
  saveGame();
}

function repairRaft(){
  if(!removeItem('wood',2)) return;
  let repair = 30;
  if(hasTalent('tinkerer')) repair = Math.floor(repair * 1.4);
  G.raftHp = Math.min(G.raftHpMax||100, G.raftHp + repair);
  addLog(`🔧 修复木筏+${repair}耐久`,'success');
  closePanel();
  renderAll();
}

function doSleep(hours){
  closePanel();
  G.isSleeping = true;
  const baseRecover = hours * 10;
  const bedBonus = G.furniture.includes('_bed2') ? 25 : G.furniture.includes('_bed1') ? 10 : 0;
  const talentBonus = hasTalent('early_bird') ? 15 : 0;
  const totalRecover = baseRecover + bedBonus + talentBonus;
  G.attrs.hp = clamp(G.attrs.hp + totalRecover, 0, G.attrs.hpMax);
  // 推进时间
  G.hour += hours;
  while(G.hour >= 24){G.hour -= 24;G.day++;G.totalDaysSurvived++;}
  // 睡觉期间消耗
  G.attrs.hunger = Math.max(0, Math.round((G.attrs.hunger - hours * 1.5)*100)/100);
  G.attrs.thirst = Math.max(0, Math.round((G.attrs.thirst - hours * 1.8)*100)/100);
  G.isSleeping = false;
  addLog(`💤 睡了${hours}小时，恢复体力${totalRecover}点`,'success');
  // 睡觉期间可能被袭击
  if(G.isNight && G.raftLv < 3 && Math.random() < 0.25){
    const dmg = randInt(10, 25);
    G.attrs.hp = Math.max(0, G.attrs.hp - dmg);
    addLog(`⚠️ 睡梦中遭到袭击！体力-${dmg}`,'danger');
    if(G.raftLv >= 2){const rdmg=randInt(5,15);G.raftHp=Math.max(0,G.raftHp-rdmg);addLog(`🏗️ 木筏受损！耐久-${rdmg}（当前${G.raftHp}/100）`,'danger');}
    if(G.raftHp > 0 && G.raftHp <= 5){
      showToast('⚠️ 木筏耐久不足5%！即将解体！', 'danger');

  }

}

// ==================== 战斗系统 ====================
let combat = null;

function triggerMonsterAttack(){
  if(G.combatState) return;
  // 根据天数选择怪物等级范围
  const maxLv = Math.min(1 + Math.floor(G.day / 3), 12);
  const pool = MONSTERS.filter(m => m.lv <= maxLv && !m.boss);
  const monster = pick(pool);
  startCombat(monster);
}

function startCombat(monsterDef){
  const isBoss = monsterDef.boss;
  combat = {
    monster: {...monsterDef, currentHp: monsterDef.hp},
    turn: 0,
    playerDefending: false,
    poisonTurns: 0,
    paralyzeTurns: 0,
    bindTurns: 0,
    blindTurns: 0,
    log: []
  };
  // 战斗直觉天赋：首回合自动发现1个弱点
  if(hasTalent('combat_instinct')){
    const obs1 = getObservation(combat.monster, 1);
    combat.currentObsLevel = 1;
    combat.observations = {1: obs1};
    combat.log.push('⚔️ 战斗直觉！自动发现弱点！');
    combat.log.push(`🔍 ${obs1.hint}`);
    combat.log.push(`✅ 效果：${obs1.label}`);
  }
  // 深渊之眼天赋：所有怪物弱点全可见
  if(hasTalent('abyss_eye_t')){
    combat.currentObsLevel = 5;
    combat.observations = {};
    for(let lv=1;lv<=5;lv++) combat.observations[lv] = getObservation(combat.monster, lv);
    combat.log.push('👁️ 深渊之眼！洞察敌人所有弱点！');
    Object.values(combat.observations).forEach(o => {
      combat.log.push(`✅ ${o.label}`);
    });
  }
  G.combatState = true;
  // 图鉴记录：遭遇怪物
  G.codex.monster[monsterDef.id] = true;
  addLog(`⚔️ 遭遇了 ${monsterDef.icon} ${monsterDef.name}！`,'danger');
  renderCombat();
}

function renderCombat(){
  if(!combat) return;
  const m = combat.monster;
  const a = G.attrs;
  const body = document.getElementById('panelBody');

  // 智力阈值修正（万物共鸣天赋：智力判定+30）
  const effectiveInt = hasTalent('resonance') ? a.int + 30 : a.int;
  const lvDiff = Math.max(0, m.lv - G.level);
  const intThresholds = [20, 40, 60, 80, 100].map(t => t + lvDiff * 10);
  // 最多5个观察选项，根据智力解锁
  const observeLevels = [];
  if(effectiveInt >= intThresholds[0]) observeLevels.push(1);
  if(effectiveInt >= intThresholds[1]) observeLevels.push(2);
  if(effectiveInt >= intThresholds[2]) observeLevels.push(3);
  if(effectiveInt >= intThresholds[3]) observeLevels.push(4);
  if(effectiveInt >= intThresholds[4]) observeLevels.push(5);

  let html = `<div class="panel-title combat-panel">⚔️ 战斗<button class="panel-close" onclick="fleeCombat()">逃跑</button></div>
    <div class="combat-panel">
      <div class="enemy-info">
        <div class="enemy-name">${m.icon} ${m.name} Lv.${m.lv}</div>
        <div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:${pct(m.currentHp,m.hp)}%"></div></div>
        <div style="font-size:11px;color:var(--text-dim)">血量: ${m.currentHp}/${m.hp}</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin:4px 0">
        ${(combat.observations ? Object.values(combat.observations) : []).map(o =>
          `<span style="font-size:10px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:4px">${o.label}</span>`
        ).join('')}
      </div>
      <div class="combat-log">`;
  combat.log.forEach(l => html += `<div>${l}</div>`);
  html += `</div>
      <div style="font-size:11px;color:var(--text-dim);margin:4px 0">你的体力：${a.hp}/${a.hpMax} ${G.equipment.weapon?'| 武器：'+ITEMS[G.equipment.weapon].name:''}</div>
      <div class="combat-opts">`;

  // 观察选项（基于智力）
  if(combat.turn === 0 || observeLevels.length > 0){
    observeLevels.forEach((lv, idx) => {
      const observations = getObservation(m, lv);
      const alreadyFound = combat.observations && combat.observations[lv];
      html += `<div class="combat-opt${alreadyFound?' disabled':''}" onclick="${alreadyFound?'':`observeEnemy(${lv})`}">
        🔍 观察 Lv.${lv} <span class="opt-tag">智力≥${intThresholds[idx]}</span>${alreadyFound?' <span class="opt-tag" style="background:#22c55e">✓已发现</span>':''}
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${alreadyFound ? observations.label : observations.hint}</div>
      </div>`;
    });
  }

  // 基础攻击
  if(G.equipment?.weapon){
    const w = ITEMS[G.equipment.weapon];
    html += `<div class="combat-opt" onclick="combatAttack()">⚔️ 攻击（体力-10~15）</div>`;
    if(w.wclass === 'bow') html += `<div class="combat-opt" onclick="combatRanged()">🏹 远程攻击（体力-12，先手）</div>`;
    if(w.wclass === 'dagger') html += `<div class="combat-opt" onclick="combatDoubleStrike()">🗡️ 连击（体力-20，攻击2次）</div>`;
    if(w.wclass === 'axe') html += `<div class="combat-opt" onclick="combatHeavyStrike()">🪓 重击（体力-20，30%破防）</div>`;
    if(w.mp > 0) html += `<div class="combat-opt" onclick="combatSpell()">🔮 法术攻击（体力-15，法术值${getMpValue()}）</div>`;
  } else {
    html += `<div class="combat-opt" onclick="combatPunch()">👊 拳击（体力-10，低伤害）</div>`;
  }

  html += `<div class="combat-opt" onclick="combatDefend()">🛡️ 防御（体力-5，减伤60%）</div>`;

  // 使用食物（战斗中）
  const foods = Object.keys(G.inventory).filter(id => ITEMS[id]?.type === 'food' || ITEMS[id]?.type === 'drink');
  if(foods.length > 0){
    html += `<div class="combat-opt" onclick="combatUseItem()">🎒 使用物品</div>`;
  }

  // 逃跑
  html += `<div class="combat-opt" onclick="fleeCombat()">🏃 逃跑（幸运值判定）`;
  if(hasTalent('steal')) html += ` <span class="opt-tag">可偷取</span>`;
  html += `</div>`;

  html += '</div></div>';
  body.innerHTML = html;
  openPanel();
}

function observeEnemy(level){
  if(!combat) return;
  const obs = getObservation(combat.monster, level);
  combat.currentObsLevel = Math.max(combat.currentObsLevel || 0, level);
  combat.observations = combat.observations || {};
  combat.observations[level] = obs;
  combat.log.push(`🔍 ${obs.hint}`);
  combat.log.push(`✅ 效果：${obs.label}`);
  // 观察消耗1回合
  enemyTurn();
  renderCombat();
}

function combatAttack(){
  if(!combat) return;
  const staminaCost = randInt(10,15);
  if(G.attrs.hp < staminaCost){showToast('体力不足！');return}
  G.attrs.hp -= staminaCost;
  let dmg = getAtkValue() + randInt(2,5);
  // 弱点加成：根据当前观察等级
  const obsLevel = combat.currentObsLevel || 0;
  if(obsLevel >= 5) dmg = Math.floor(dmg * 2.5);
  else if(obsLevel >= 3) dmg = Math.floor(dmg * 2.0);
  else if(obsLevel >= 1) dmg = Math.floor(dmg * 1.5);
  // Lv.2闪避：本次攻击后敌人下回合miss
  if(obsLevel >= 2) combat.dodgeNextAttack = true;
  // 护甲减伤
  if(combat.monster.armor) dmg = Math.floor(dmg * 0.5);
  combat.monster.currentHp -= dmg;
  combat.log.push(`⚔️ 你攻击了${combat.monster.name}，造成${dmg}伤害！${obsLevel>=1?' 💥弱点打击！':''}`);
  // 反伤（Lv.5洞察无效化）
  if(combat.monster.reflect && obsLevel < 5){
    const reflectDmg = Math.floor(dmg * 0.2);
    G.attrs.hp = Math.max(0, G.attrs.hp - reflectDmg);
    combat.log.push(`🪼 ${combat.monster.name}反伤！你受到${reflectDmg}伤害！`);
  }
  checkCombatEnd() || enemyTurn();
  renderCombat();
}

function combatUseItem(){
  if(!combat) return;
  const foods = Object.keys(G.inventory).filter(id => ITEMS[id]?.type === 'food' || ITEMS[id]?.type === 'drink');
  if(foods.length === 0){showToast('没有可用物品');return}
  // 自动使用第一个食物
  const id = foods[0];
  const item = ITEMS[id];
  if(item.type === 'food'){
    let h = item.hunger||0, t = item.thirst||0, s = item.stamina||0;
    if(hasTalent('fast_metab'))s+=10;
    removeItem(id);
    G.attrs.hunger=clamp(G.attrs.hunger+h,0,G.attrs.hungerMax);
    G.attrs.thirst=clamp(G.attrs.thirst+t,0,G.attrs.thirstMax);
    G.attrs.hp=clamp(G.attrs.hp+s,0,G.attrs.hpMax);
    combat.log.push(`🎒 使用了 ${item.name}，恢复体力${s}`);
  } else {
    let t=item.thirst||0, s=item.stamina||0;
    removeItem(id);
    G.attrs.thirst=clamp(G.attrs.thirst+t,0,G.attrs.thirstMax);
    G.attrs.hp=clamp(G.attrs.hp+s,0,G.attrs.hpMax);
    combat.log.push(`🎒 使用了 ${item.name}，恢复体力${s}`);
  }
  enemyTurn();
  renderCombat();
}

function enemyTurn(){
  if(!combat) return;
  combat.turn++;
  // 野性直觉：首回合怪物不攻击
  if(combat.wildInstinctBonus && combat.turn === 1){
    combat.log.push('🐾 野性直觉！你提前做好了准备，怪物未能发动攻击！');
    combat.wildInstinctBonus = false;
    return;
  }
  const m = combat.monster;

  // Lv.2弱点闪避：洞悉攻击规律后闪避一次
  if(combat.dodgeNextAttack){
    combat.log.push(`👀 你洞悉了${m.name}的攻击规律，成功闪避！`);
    combat.dodgeNextAttack = false;
    return;
  }

  let dmg = m.atk + randInt(-2, 3);

  // 玩家防御减伤
  if(combat.playerDefending){
    dmg = m.pierce ? Math.floor(dmg * 0.7) : Math.floor(dmg * 0.4);
    combat.playerDefending = false;
  }

  // 不屈天赋
  if(G.attrs.hp - dmg <= 0 && hasTalent('unyield') && !G.undyingUsed){
    G.attrs.hp = 20;
    G.undyingUsed = true;
    combat.log.push('🔥 不屈天赋发动！体力恢复到20！');
    return;
  }

  G.attrs.hp = Math.max(0, G.attrs.hp - dmg);
  combat.log.push(`${m.icon} ${m.name}攻击了你，造成${dmg}伤害！`);

  // 怪物特殊效果（Lv.5完全洞察后特殊能力无效化）
  const obsLevel5 = combat.currentObsLevel >= 5;
  if(m.poison && !obsLevel5){
    const pdmg = randInt(2,5);
    G.attrs.hp = Math.max(0, G.attrs.hp - pdmg);
    combat.log.push(`🧪 ${m.name}的毒素造成了${pdmg}额外伤害！`);
  }
  if(m.paralyze && !obsLevel5 && Math.random() < 0.3){
    combat.log.push(`⚡ ${m.name}的麻痹效果！你下回合无法攻击！`);
    combat.paralyzeTurns = (combat.paralyzeTurns||0) + 1;
  }
  if(m.bind && !obsLevel5 && combat.turn % 3 === 0){
    const bindDmg = randInt(3,8);
    G.attrs.hp = Math.max(0, G.attrs.hp - bindDmg);
    combat.log.push(`🐙 ${m.name}缠绕了你！造成${bindDmg}伤害！`);
  }
  if(m.blind && !obsLevel5 && Math.random() < 0.3){
    combat.blindTurns = (combat.blindTurns||0) + 1;
    combat.log.push(`💡 ${m.name}的致盲光效！观察选项被隐藏！`);
  }
  if(m.doubleAtk && !obsLevel5){
    const dmg2 = Math.floor(m.atk * 0.6) + randInt(-1, 2);
    G.attrs.hp = Math.max(0, G.attrs.hp - dmg2);
    combat.log.push(`🐋 ${m.name}发动二连击！造成${dmg2}伤害！`);
  }
  if(obsLevel5 && (m.poison || m.paralyze || m.bind || m.blind || m.doubleAtk)){
    combat.log.push(`👁️ 完全洞察！${m.name}的特殊能力被你完美克制！`);
  }

  if(G.attrs.hp <= 0){
    combat.log.push('💀 你被打退了...');
    combatDefeat();
  }
}

function checkCombatEnd(){
  if(combat.monster.currentHp <= 0){
    combatVictory(false);
    return true;
  }
  return false;
}

function combatVictory(drivenOff){
  const m = combat.monster;
  combat.log.push(`🎉 ${drivenOff ? m.name+'被驱赶了！' : '击杀了'+m.name+'！'}`);
  // 经验
  const exp = m.lv * (drivenOff ? 3 : 5);
  gainExp(exp);
  addLog(`⚔️ ${drivenOff?'驱赶':'击杀'}了${m.name}，获得${exp}经验`,'success');

  // 掉落（幸运值影响）
  if(!drivenOff){
    const luckBonus = G.attrs.luck * 0.02;
    const dropCount = 1 + (Math.random() < 0.3 + luckBonus ? 1 : 0);
    for(let i=0;i<dropCount;i++){
      const dropId = pick(m.drops);
      if(ITEMS[dropId]){
        addItem(dropId);
        addLog(`📦 获得 ${ITEMS[dropId].icon} ${ITEMS[dropId].name}`,'success');
      }
    }
    // Boss额外掉落
    if(m.boss || m.lv >= 7){
      const bd = pick(m.bossDrops || m.drops);
      if(ITEMS[bd]){
        addItem(bd);
        addLog(`💎 额外掉落 ${ITEMS[bd].icon} ${ITEMS[bd].name}！`,'event');
      }
    }
  }

  G.stats.monstersKilled++;
  // 骨骸方舟：击杀额外鱼骨
  if(G.flags.boneBonus){addItem('fish_bone',randInt(1,3));addLog('🦴 骨骸方舟效果：额外获得鱼骨','success');}
  combat = null;
  G.combatState = false;
  setTimeout(()=>{closePanel();renderAll();}, 1000);
}

function combatDefeat(){
  // 体力归零，被打退
  G.attrs.hp = 5; // 最低给5点
  // 随机丢失1件物品
  const invKeys = Object.keys(G.inventory);
  if(invKeys.length > 0){
    const lost = pick(invKeys);
    removeItem(lost, 1);
    addLog(`💀 被打退了...丢失了 ${ITEMS[lost]?.name||lost}`,'danger');
  }
  combat = null;
  G.combatState = false;
  setTimeout(()=>{closePanel();renderAll();}, 1000);
}

function fleeCombat(){
  if(!combat) return;
  const luckChance = 0.3 + G.attrs.luck * 0.03;
  if(Math.random() < luckChance){
    addLog('🏃 成功逃跑！','success');
    // 偷取
    if(hasTalent('steal') && Math.random() < 0.4 + G.attrs.luck * 0.02){
      const m = combat.monster;
      const dropId = pick(m.drops);
      if(ITEMS[dropId]){
        addItem(dropId);
        addLog(`🤭 偷取成功！获得 ${ITEMS[dropId].icon} ${ITEMS[dropId].name}`,'event');
      }
      // 小概率偷到天赋
      if(Math.random() < 0.05){
        const t = rollTalent();
        if(t){
          G.talents.push(t);
          applyTalentEffect(t);
          addLog(`✨ 偷到了天赋：${t.name}（${t.rank}级）！`,'event');
        }
      }
    }
  } else {
    addLog('🏃 逃跑失败！','danger');
    enemyTurn();
    renderCombat();
    return;
  }
  combat = null;
  G.combatState = false;
  closePanel();
  renderAll();
}

// ==================== 狩猎系统 ====================
function goHunting(){
  if(!G.equipment.weapon){showToast('需要装备武器！');return}
  if(G.attrs.hp < 15){showToast('体力不足！');return}
  // 消耗体力
  G.attrs.hp -= randInt(10, 15);
  // 根据天数和木筏等级选择怪物
  const maxLv = Math.min(G.raftLv * 2, 1 + Math.floor(G.day / 2), 12);
  const pool = MONSTERS.filter(m => m.lv <= maxLv);
  const monster = pick(pool);
  startCombat(monster);
}

function doExplore(){
  if(G.attrs.hp < 10){showToast('体力不足！');return}
  const staminaCost = randInt(5, 10);
  // 疲劳加成
  if(G.hour >= 23 || G.hour < 1) staminaCost += 2;
  else if(G.hour >= 1 && G.hour < 3) staminaCost *= 2;
  G.attrs.hp -= staminaCost;
  advanceMinutes(15);

  // 30%概率触发随机事件/怪物，70%进入探索场景
  // 人鱼之友天赋：水下探索不遇主动攻击
  const avoidMonster = hasTalent('mermaid_friend');
  if(Math.random() < 0.3){
    if(Math.random() < 0.5){
      triggerRandomEvent();
    } else if(!avoidMonster){
      triggerMonsterAttack();
    } else {
      addLog('🧜 人鱼之友天赋发动！水下的生物对你表示友好，避免了战斗。','success');
      const scene = pick(EXPLORE_SCENES);
      showExploreScene(scene);
    }
  } else {
    const scene = pick(EXPLORE_SCENES);
    showExploreScene(scene);
  }
  renderAll();
}


function showExploreScene(scene, resultText){
  const body = document.getElementById('panelBody');
  let html = `<div class="panel-title">${scene.icon||'🔍'} ${scene.name}<button class="panel-close" onclick="closePanel()">✕</button></div>`;
  // 显示上一层的结果文本
  if(resultText){
    html += `<div style="padding:10px 12px;font-size:13px;color:var(--text);line-height:1.6;background:var(--bg-card);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--accent)">${resultText}</div>`;
  }
  html += `<div style="text-align:center;padding:10px 0;font-size:14px;color:var(--text);line-height:1.6">${scene.desc}</div>`;
  html += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">';
  (scene.choices||[]).forEach((ch,i)=>{
    // 计算成功率
    let rateInfo = '';
    if(!ch.noRate && ch.rate){
      const rate = Math.round(ch.rate() * 100);
      const rateColor = rate >= 70 ? '#22c55e' : rate >= 40 ? '#f59e0b' : '#ef4444';
      rateInfo = ` <span style="font-size:11px;color:${rateColor}">(${rate}%)</span>`;
    }
    let costInfo = '';
    if(ch.cost && ch.cost.hp) costInfo = ` <span style="font-size:11px;color:var(--text-warn)">体力-${ch.cost.hp}</span>`;
    html += `<div class="event-choice" onclick="doExploreChoice(${i})">${ch.text}${costInfo}${rateInfo}</div>`;
  });
  html += '</div>';
  G._exploreScene = scene;
  body.innerHTML = html;
  openPanel();
}

function doExploreChoice(idx){
  const scene = G._exploreScene;
  if(!scene) return;
  const choice = (scene.choices||[])[idx];
  if(!choice) return;

  // 扣除消耗
  if(choice.cost && choice.cost.hp){
    G.attrs.hp = Math.max(0, G.attrs.hp - choice.cost.hp);
  }

  let resultData;
  let resultText = '';

  if(choice.noRate){
    // 确定性结果
    resultData = choice.result;
  } else {
    // 概率判定
    const rate = choice.rate ? choice.rate() : 0.5;
    const success = Math.random() < rate;
    resultData = success ? choice.success : choice.fail;
  }

  if(!resultData){
    // 没有后续，关闭面板
    G._exploreScene = null;
    closePanel();
    renderAll();
    saveGame();
    return;
  }

  // 显示结果叙事
  if(resultData.text){
    addLog(resultData.text.substring(0, 60) + '...', 'event');
  }

  // 应用效果
  G._exploring = true;
  if(resultData.loot){
    for(const [id, n] of Object.entries(resultData.loot)){
      if(ITEMS[id]){
        addItem(id, n);
        addLog(`📦 获得 ${ITEMS[id].icon} ${ITEMS[id].name}×${n}`, 'success');
      }
    }
  }
  if(resultData.exp) gainExp(resultData.exp);
  if(resultData.cost && resultData.cost.hp){
    G.attrs.hp = Math.max(0, G.attrs.hp - resultData.cost.hp);
    addLog(`💔 体力-${resultData.cost.hp}`, 'danger');
  }
  if(resultData.flag){
    G.flags[resultData.flag] = resultData.flagVal !== undefined ? resultData.flagVal : true;
  }
  G._exploring = false;

  // 检查是否有下一层
  const nextData = resultData.next || resultData.failNext;
  if(nextData){
    G._exploreScene = nextData;
    renderAll();
    showExploreScene(nextData, resultData.text);
    saveGame();
    return;
  }

  // 没有下一层，显示最终结果
  if(resultData.text){
    // 用面板展示最终叙事
    const body = document.getElementById('panelBody');
    let html = `<div class="panel-title">📜 探索结果<button class="panel-close" onclick="closePanel()">✕</button></div>`;
    html += `<div style="padding:12px;font-size:14px;color:var(--text);line-height:1.8">${resultData.text}</div>`;
    if(resultData.loot){
      html += '<div style="padding:8px 12px;display:flex;flex-wrap:wrap;gap:6px">';
      for(const [id, n] of Object.entries(resultData.loot)){
        if(ITEMS[id]) html += `<span style="font-size:12px;color:var(--success);background:#1a2e1a;padding:3px 8px;border-radius:4px">${ITEMS[id].icon} ${ITEMS[id].name}×${n}</span>`;
      }
      html += '</div>';
    }
    html += `<div class="event-choice" onclick="closePanel()" style="text-align:center;margin-top:12px">确定</div>`;
    body.innerHTML = html;
    // 不关闭面板，让用户看完点确定
  } else {
    G._exploreScene = null;
    closePanel();
  }
  renderAll();
  saveGame();
}

function triggerRandomEvent(){
  if(G.eventState) return;
  // 珍珠宫殿减益：海盗来袭概率翻倍
  if(G.flags.bioShip==='pearl_palace' && Math.random()<0.25){
    const pirateEvent = EVENTS.find(e=>e.id==='pirate');
    if(pirateEvent){G.eventState=pirateEvent;renderEvent();return;}
  }
  // 加权随机：岛屿和NPC事件权重更高
  const weights = {
    floating_chest:5, stranded_ship:4, island:3, merchant:5, pirate:3,
    storm:2, seagull:4, lucky_find:5, whirlpool:3, fog:2,
    drifter:5, moonlit_sea:2, airdrop:2, mermaid:5, seaquake:1,
    floating_garden:4, ghost_ship:3, dolphin:4, floating_market:3, meteor:2
  };
  const totalW = EVENTS.reduce((s,e) => s + (weights[e.id]||1), 0);
  let r = Math.random() * totalW;
  let event = EVENTS[0];
  for(const e of EVENTS){
    r -= (weights[e.id]||1);
    if(r <= 0){event = e; break;}
  }
  G.eventState = event;
  renderEvent();
}

function renderEvent(){
  if(!G.eventState) return;
  const e = G.eventState;
  const body = document.getElementById('panelBody');

  let html = `<div class="panel-title event-panel">${e.icon} ${e.name}<button class="panel-close" onclick="skipEvent()">✕</button></div>
    <div class="event-panel">
      <div class="event-desc">${e.desc}</div>
      <div class="event-choices">`;

  e.choices.forEach((ch, idx) => {
    let canChoose = true;
    let reqText = '';
    if(ch.req){
      let intReq = ch.req.int || 0;
      // 顺风耳天赋：隐藏商品无需智力门槛
      if(ch.result === 'trade_hidden' && hasTalent('good_ear')) intReq = 0;
      // 万物共鸣天赋：智力判定永远+30
      const effectiveInt = getEffectiveInt();
      if(intReq && effectiveInt < intReq){canChoose=false;reqText=`需要智力≥${intReq}`}
      if(ch.req.weapon && !G.equipment.weapon){canChoose=false;reqText='需要装备武器'}
      if(ch.req.talent && !hasTalent(ch.req.talent)){canChoose=false;reqText=`需要天赋：${ch.req.talent}`}
      if(ch.req.raftLv && G.raftLv < ch.req.raftLv){canChoose=false;reqText=`需要木筏Lv.${ch.req.raftLv}`}
    }
    html += `<div class="event-choice${canChoose?'':' cant'}" onclick="${canChoose?`chooseEvent(${idx})`:''}">
      ${ch.text}${reqText?` <span class="req">[${reqText}]</span>`:''}
    </div>`;
  });

  html += '</div></div>';
  body.innerHTML = html;
  openPanel();
}

function chooseEvent(idx){
  const e = G.eventState;
  const choice = e.choices[idx];
  if(!choice) return;

  if(choice.stamina) G.attrs.hp = Math.max(0, G.attrs.hp - choice.stamina);

  switch(choice.result){
    case 'loot': {
      const rarity = choice.rarity || 0.6;
      const items = rollLoot(rarity);
      items.forEach(id => {
        if(ITEMS[id]) {
          addItem(id);
          addLog(`📦 获得 ${ITEMS[id].icon} ${ITEMS[id].name}`,'success');
        }
      });
      break;
    }
    case 'none':
      addLog('你选择了忽略。');
      break;
    case 'explore_ship': {
      const danger = choice.danger || 0.3;
      if(Math.random() < danger){
        const dmg = randInt(15, 30);
        G.attrs.hp = Math.max(0, G.attrs.hp - dmg);
        addLog(`⚠️ 探索中遇到危险！体力-${dmg}`,'danger');
      }
      const items = rollLoot(0.3);
      items.forEach(id => {
        if(ITEMS[id]){addItem(id);addLog(`📦 获得 ${ITEMS[id].icon} ${ITEMS[id].name}`,'success');}
      });
      break;
    }
    case 'island_explore': {
      addLog('🏝️ 你登上了小岛！','event');
      const islandItems = ['fruit','wood','wood','coconut_juice','shell','vine','coral'];
      const count = randInt(2,4);
      for(let i=0;i<count;i++){
        const id = pick(islandItems);
        addItem(id);
        addLog(`📦 获得 ${ITEMS[id].icon} ${ITEMS[id].name}`,'success');
      }
      break;
    }
    case 'trade': {
      // 简化交易：用物资换特殊物品
      if(itemCount('raw_fish') >= 2){
        removeItem('raw_fish',2);
        const tradeItems = ['mineral_water','energy_drink','rope','cloth','metal_scrap','tool'];
        const id = pick(tradeItems);
        addItem(id);
        addLog(`🧙 与商人交易：2条鱼 → ${ITEMS[id].icon} ${ITEMS[id].name}`,'success');
        G.npcAffinity.merchant = Math.min(100, G.npcAffinity.merchant + 3);
      } else {
        addLog('🧙 商人：你没有什么值得交易的东西...','warn');
      }
      break;
    }
    case 'trade_hidden': {
      // 隐藏商品
      if(itemCount('pearl') >= 1){
        removeItem('pearl',1);
        const hiddenItems = ['int_book','lucky_coin','gear','circuit','scuba'];
        const id = pick(hiddenItems);
        addItem(id);
        addLog(`🧙 获得隐藏商品：${ITEMS[id].icon} ${ITEMS[id].name}！`,'event');
        G.npcAffinity.merchant = Math.min(100, G.npcAffinity.merchant + 10);
      } else {
        addLog('🧙 隐藏商品需要珍珠作为交换','warn');
      }
      break;
    }
    case 'steal_npc': {
      const luckChance = 0.3 + G.attrs.luck * 0.015;
      if(Math.random() < luckChance){
        const id = pick(['mineral_water','energy_drink','tool','pearl','circuit']);

function rollLoot(rarity){
  const count = randInt(1, 3);
  const items = [];
  const tables = {
    common:['raw_fish','seaweed','wood','metal_scrap','rope','shell'],
    uncommon:['cooked_fish','fruit','mineral_water','cloth','vine','fish_bone','metal_scrap'],
    rare:['crab_meat','energy_drink','coconut_juice','pearl','coral','metal_block','tool'],
    epic:['shark_fin','deep_crystal','int_book','lucky_coin','gear','circuit','scuba'],
    legendary:['monster_core','deep_crystal','pearl','circuit','int_book']
  };
  for(let i=0;i<count;i++){
    let r = Math.random();
    let table;
    if(r < rarity * 0.1) table = tables.legendary;
    else if(r < rarity * 0.3) table = tables.epic;
    else if(r < rarity * 0.6) table = tables.rare;
    else if(r < rarity) table = tables.uncommon;
    else table = tables.common;
    items.push(pick(table));
  }
  return items;
}

      cat.items.forEach(id => {
        const item = ITEMS[id];
        const monster = MONSTERS.find(m => m.id === id);
        if(item){
          // 物品类条目
          let effect = '';
          if(item.type==='food'){
            const parts = [];
            if(item.hunger) parts.push(`饱腹+${item.hunger}`);
            if(item.thirst) parts.push(`水分${item.thirst>0?'+':''}${item.thirst}`);
            if(item.stamina) parts.push(`体力+${item.stamina}`);
            if(item.bonusAttr){const attrName={hpMax:'体力上限',hungerMax:'饱腹上限',thirstMax:'水分上限',luck:'幸运',int:'智力'}[item.bonusAttr]||item.bonusAttr;parts.push(`${attrName}+${item.bonusVal}`);}
            effect = parts.join(' · ');
          } else if(item.type==='drink'){
            const parts = [];
            if(item.thirst) parts.push(`水分+${item.thirst}`);
            if(item.stamina) parts.push(`体力+${item.stamina}`);
            if(item.hunger) parts.push(`饱腹+${item.hunger}`);
            effect = parts.join(' · ');
          } else if(item.type==='weapon'){effect=`攻击:${item.atk} 精神:${item.mp}`;}
          else {effect=item.desc||'';}
          html += `<div style="font-size:12px;padding:4px 8px;background:var(--bg-card);border-radius:4px;margin-bottom:3px">${item.icon} ${item.name}${effect?' — '+effect:''}</div>`;
        } else if(monster){
          // 怪物条目
          html += `<div style="font-size:12px;padding:4px 8px;background:var(--bg-card);border-radius:4px;margin-bottom:3px">${monster.icon} ${monster.name}（Lv.${monster.lv} 血量:${monster.hp} 攻击:${monster.atk}）— ${monster.desc}</div>`;
        } else {
          // 菜谱/合成结果（可能不是物品ID）
          const recipe = COOK_RECIPES.find(r=>r.id===id);
          if(recipe){
            html += `<div style="font-size:12px;padding:4px 8px;background:var(--bg-card);border-radius:4px;margin-bottom:3px">${ITEMS[recipe.result]?.icon||'🍽️'} ${recipe.name} — ${ITEMS[recipe.result]?.desc||''}</div>`;
          } else {
            html += `<div style="font-size:12px;padding:4px 8px;background:var(--bg-card);border-radius:4px;margin-bottom:3px">❓ ${id}</div>`;
          }
        }
      });
    }
  });

  // 总计
  const totalCount = Object.keys(codex.fish).length + Object.keys(codex.monster).length + Object.keys(codex.cook).length + Object.keys(codex.craft).length;
  html += `<div style="margin-top:12px;text-align:center;font-size:12px;color:var(--text-dim)">图鉴进度：共 ${totalCount} 项</div>`;

  body.innerHTML = html;
  openPanel();
}

    {dir:'北',icon:'⬆️',desc:'向深海前进，怪物更强，物资更稀有'},
    {dir:'东',icon:'➡️',desc:'沿岸航行，物资较多，偶遇岛屿'},
    {dir:'南',icon:'⬇️',desc:'返回近海，相对安全'},
    {dir:'西',icon:'⬅️',desc:'未知海域，可能遇到任何事'},
  ];
  const speedMap = {1:1,2:1,3:1,4:2,5:3};
  const curSpeed = (speedMap[G.raftLv]||1) * (G.flags.bioShip==='bone_ark'?0.5:1);
  dirs.forEach(d=>{
    const staminaCost = G.raftLv >= 4 ? 0 : (G.raftLv >= 2 ? 5 : 999);
    const canMove = G.raftLv >= 2 && (staminaCost === 0 || G.attrs.hp >= staminaCost);
    // 雷达信息（5级）
    let radarHint = '';
    if(G.raftLv >= 5){
      const radarRange = Math.ceil(curSpeed * 3);
      const islandResult = detectIslandInDirection(d.dir, radarRange);
      if(islandResult.found){
        const hrs = Math.ceil(islandResult.distance / curSpeed);
        radarHint = `<div style="font-size:11px;color:#22c55e;margin-top:2px">📡 岛屿！${islandResult.distance}格处，约${hrs}h</div>`;
      }
    }

      ${radarHint}
    </div>`;

function moveDirection(dir, cost){
  if(cost > 0) G.attrs.hp = Math.max(0, G.attrs.hp - cost);
  // 推进时间
  advanceMinutes(60);

  // 航行速度（木筏等级影响）
  const speedMap = {1:1, 2:1, 3:1, 4:2, 5:3};
  const speed = speedMap[G.raftLv] || 1;
  const isBoneArk = G.flags.bioShip === 'bone_ark';
  const effectiveSpeed = isBoneArk ? Math.ceil(speed * 0.5) : speed; // 骨骸方舟速度减半

  addLog(`🗺️ 向${dir}航行了${effectiveSpeed}格（速度${effectiveSpeed}）${cost>0?'（体力-'+cost+'）':''}...`,'event');

  // === 岛屿雷达检测（5级解锁）===
  let radarInfo = '';
  if(G.raftLv >= 5){
    const radarRange = effectiveSpeed * 3; // 雷达范围 = 速度 × 3
    const islandInDir = detectIslandInDirection(dir, radarRange);
    if(islandInDir.found){
      const hoursToReach = Math.ceil(islandInDir.distance / effectiveSpeed);
      radarInfo = ` 📡雷达：${dir}方${islandInDir.distance}格处发现岛屿！约${hoursToReach}小时到达`;
      addLog(`📡 雷达扫描：${dir}方发现岛屿信号！距离${islandInDir.distance}格，以当前速度约${hoursToReach}小时到达`,'event');
      // 保存雷达发现
      G.radarIsland = {dir, distance: islandInDir.distance, hoursNeeded: hoursToReach, discovered: true};
    } else {
      radarInfo = ' 📡雷达：该方向未发现岛屿';
      addLog(`📡 雷达扫描：${dir}方未发现岛屿信号`,'');
      G.radarIsland = null;
    }
  }

  // === 根据方向触发事件 ===
  // 基础概率：平时也有概率遇到岛屿
  const dirIslandBonus = {
    '北': 0.15,  // 深海方向岛屿较少但资源好
    '东': 0.25,  // 沿岸方向岛屿较多
    '南': 0.10,  // 近海方向较安全
    '西': 0.20,  // 未知海域
  };

  let islandChance = 0.08 + (dirIslandBonus[dir] || 0.10); // 基础8% + 方向加成
  // 雷达发现岛屿时提高遭遇概率
  if(G.radarIsland && G.radarIsland.dir === dir) islandChance += 0.3;
  // 速度加成：速度越快探索范围越大
  islandChance += (effectiveSpeed - 1) * 0.05;

  const monsterChance = {'北':0.15,'东':0.08,'南':0.05,'西':0.12}[dir] || 0.08;
  const lootChance = 0.25;

  const roll = Math.random();

  if(roll < islandChance){
    // 遇到岛屿！
    const islandEvent = EVENTS.find(e=>e.id==='island');
    if(islandEvent){
      G.radarIsland = null; // 到达岛屿后清除雷达记录
      G.eventState=islandEvent;renderEvent();return;
    }
  } else if(roll < islandChance + monsterChance){
    if(Math.random() < 0.5) triggerMonsterAttack();
    else triggerRandomEvent();
  } else if(roll < islandChance + monsterChance + lootChance){
    // 发现漂浮物资
    const lootCount = randInt(1,2 + effectiveSpeed);
    for(let i=0;i<lootCount;i++){
      const id = pick(['wood','rope','metal_scrap','seaweed','cloth','shell','vine','coral']);
      addItem(id);
      addLog(`🌊 发现 ${ITEMS[id].icon} ${ITEMS[id].name}！`,'success');
    }
  } else {
    addLog('🌊 平静的航行，什么也没有发生。');
  }
  closePanel();
  renderAll();
  saveGame();
}

// 雷达检测某方向是否有岛屿
function detectIslandInDirection(dir, range){
  // 基于伪随机种子 + 方向生成岛屿分布
  // 每个方向有不同的岛屿密度
  const density = {'北':0.3,'东':0.5,'南':0.2,'西':0.35}[dir] || 0.3;
  for(let dist = 1; dist <= range; dist++){
    // 使用确定性种子让同一时刻同一方向的扫描结果一致
    const seed = G.day * 1000 + G.hour * 10 + dir.charCodeAt(0) + dist * 7;
    const pseudo = ((Math.sin(seed) * 10000) % 1 + 1) % 1;
    if(pseudo < density * 0.4){ // 岛屿出现概率
      return {found:true, distance:dist};
    }
  }
  return {found:false, distance:0};
}

// 打开雷达面板（5级解锁）
function openRadar(){
  if(G.raftLv < 5){showToast('需要木筏Lv.5解锁雷达！');return;}

  const speedMap = {1:1,2:1,3:1,4:2,5:3};

  let html = `<div class="panel-title">📡 岛屿雷达<button class="panel-close" onclick="closePanel()">✕</button></div>`;
  html += `<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">雷达范围：${radarRange}格 | 航行速度：${speed}格/小时</div>`;

  const dirs = ['北','东','南','西'];
  const dirIcons = {'北':'⬆️','东':'➡️','南':'⬇️','西':'⬅️'};
  const dirDesc = {'北':'深海方向','东':'沿岸方向','南':'近海方向','西':'未知海域'};

  dirs.forEach(d => {
    const result = detectIslandInDirection(d, radarRange);
    if(result.found){
      const hours = Math.ceil(result.distance / speed);
      html += `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span>${dirIcons[d]} 向${d}（${dirDesc[d]}）</span>
          <span style="color:#22c55e;font-weight:600">🏝️ 发现岛屿！</span>
        </div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:4px">距离：${result.distance}格 | 预计到达：${hours}小时</div>
        <div class="event-choice" onclick="navigateToIsland('${d}')" style="margin-top:6px">🚢 前往该岛屿</div>
      </div>`;
    } else {
      html += `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;opacity:0.6">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span>${dirIcons[d]} 向${d}（${dirDesc[d]}）</span>
          <span style="color:var(--text-dim)">— 未发现</span>
        </div>
      </div>`;
    }
  });

  html += `<div style="font-size:11px;color:var(--text-dim);margin-top:8px;text-align:center">📡 雷达每小时更新扫描结果</div>`;
  body.innerHTML = html;
  openPanel();
}

// 导航到雷达发现的岛屿
function navigateToIsland(dir){
  if(!G.radarIsland || G.radarIsland.dir !== dir){
    // 需要先移动到该方向
    const staminaCost = G.raftLv >= 4 ? 0 : (G.raftLv >= 2 ? 5 : 999);
    if(G.raftLv < 2){showToast('需要木筏Lv.2才能移动！');return;}
    if(staminaCost > 0 && G.attrs.hp < staminaCost){showToast('体力不足！');return;}
  }
  closePanel();
  // 直接触发岛屿事件
  const islandEvent = EVENTS.find(e=>e.id==='island');
  if(islandEvent){
    advanceMinutes(60);
    G.radarIsland = null;
    addLog('🗺️ 根据雷达指引，你成功抵达了岛屿！','event');
    G.eventState = islandEvent;
    renderEvent();
  }
}

// ==================== 存档系统 ====================
function saveGame(){
  try{
    const save = JSON.stringify(G);
    localStorage.setItem('raftSave', save);
  }catch(e){}
}

function loadGame(){
  try{
    const save = localStorage.getItem('raftSave');
    if(save){
      G = JSON.parse(save);
      // 兼容旧存档：equipped字段迁移到equipment
      if(G.equipped && !G.equipment){
        G.equipment = {weapon:G.equipped, shoes:null, special:null};
        delete G.equipped;
      }
      if(!G.equipment) G.equipment = {weapon:null, shoes:null, special:null};
      if(!G.equipment.shoes) G.equipment.shoes = null;
      if(!G.equipment.special) G.equipment.special = null;
      // 兼容旧存档：创造之手替换为海神庇佑
      if(G.talents && G.talents.some(t=>t.id==='creator')){
        G.talents = G.talents.filter(t=>t.id!=='creator');
        if(!G.talents.some(t=>t.id==='ocean_blessing')){
          G.talents.push({id:'ocean_blessing',name:'海神庇佑',rank:'SSS',desc:'每次钓鱼/开箱额外获得1件物品'});
        }
      }
      // 兼容旧存档：天气系统字段
      if(!G.weather) G.weather = 'clear';
      if(!G.weatherTimer) G.weatherTimer = 0;
      if(!G.raftHpMax) G.raftHpMax = 100;
      // 兼容旧存档：生物船标志
      if(!G.flags) G.flags = {};
      if(!G.flags.bioShip) G.flags.bioShip = null;
      // 兼容旧存档：海王天赋字段
      if(G.seaKingUsed === undefined) G.seaKingUsed = false;
      if(G.seaKingPending === undefined) G.seaKingPending = false;
      // 兼容旧存档：烹饪/图鉴/自由合成分段
      if(G.cookLv === undefined) G.cookLv = 0;
      if(G.craftLv === undefined) G.craftLv = 0;
      // 兼容旧存档：自动根据木筏等级修正烹饪等级
      if(G.raftLv >= 3 && G.cookLv < 1) G.cookLv = 1;
      if(G.raftLv >= 4 && G.cookLv < 2) G.cookLv = 2;
      if(G.raftLv >= 5 && G.cookLv < 3) G.cookLv = 3;
      // 兼容旧存档：木筏3级自动获得舒适大床
      if(G.raftLv >= 3 && G.furniture && !G.furniture.includes('_bed2')) G.furniture.push('_bed2');
      if(G.cookExp === undefined) G.cookExp = 0;
      if(G.craftLv === undefined) G.craftLv = 0;
      if(!G.cookMastery) G.cookMastery = {};
      if(!G.craftedItems) G.craftedItems = {};
      if(!G.freeCookDiscovered) G.freeCookDiscovered = {};
      if(!G.codex) G.codex = {fish:{},monster:{},cook:{},craft:{}};
      if(!G.codex.fish) G.codex.fish = {};
      if(!G.codex.monster) G.codex.monster = {};
      if(!G.codex.cook) G.codex.cook = {};
      if(!G.codex.craft) G.codex.craft = {};
      if(!G.debuffs) G.debuffs = [];
      if(G.radarIsland === undefined) G.radarIsland = null;
      // 兼容旧存档：onRaftItems 从字符串数组转为对象数组
      if(G.onRaftItems && G.onRaftItems.length > 0 && typeof G.onRaftItems[0] === 'string'){
        const totalH = (G.day||1) * 24 + (G.hour||6);
        G.onRaftItems = G.onRaftItems.map(id => ({id:id, placedHour:totalH}));
      }
      lastIntTalentThreshold = Math.floor(G.attrs.int / 10);
      return true;
    }
  }catch(e){}
  return false;
}

// ==================== 游戏主循环 ====================
let lastTime = 0;
let autoSaveTimer = 0;

function gameLoop(timestamp){
  if(!lastTime) lastTime = timestamp;
  const dt = timestamp - lastTime;
  lastTime = timestamp;

  if(!G.isDead && G.attrs.hp > 0){
    updateGameTime(dt);
  }

  // 自动存档每30秒
  autoSaveTimer += dt;
  if(autoSaveTimer > 30000){
    autoSaveTimer = 0;
    saveGame();
  }

  requestAnimationFrame(gameLoop);
}

function startGame(){
  // 隐藏开始画面
  document.getElementById('startScreen').style.display = 'none';

  // 新游戏
  G = newGameState();
  G.attrs.hp = initAttrs.hp;
  G.attrs.hpMax = initAttrs.hp;
  G.attrs.int = initAttrs.int;
  G.attrs.hunger = initAttrs.hunger;
  G.attrs.hungerMax = 100;
  G.attrs.thirst = initAttrs.thirst;
  G.attrs.thirstMax = 100;
  G.attrs.luck = initAttrs.luck;
  lastIntTalentThreshold = Math.floor(G.attrs.int / 10);

  // 初始物资
  G.inventory = {fishing_rod:1, mineral_water:3, compressed_biscuit:3};
  G.rodDurability = 100;

  // 初始天赋
  if(initAttrs.luck > 10){
    const t = rollTalent();
    if(t){
      G.talents.push(t);
      applyTalentEffect(t);
      setTimeout(()=>showToast(`初始天赋：${t.name}（${t.rank}级）`), 1000);
    }
  }

  addLog('🌊 你醒来了，发现自己漂浮在一艘破旧的木筏上...');
  addLog('🎣 你有一根鱼竿和少量物资，努力活下去！');

  renderAll();
  requestAnimationFrame(gameLoop);
}

function loadAndStart(){
  document.getElementById('startScreen').style.display = 'none';
  if(loadGame() && !G.isDead){
    addLog('📂 读取了存档','success');
  } else {
    showToast('存档损坏，将开始新游戏');
    startGame();
    return;
  }
  renderAll();
  requestAnimationFrame(gameLoop);
}

// 初始化
initAttrs = rollInitAttrs();
renderInitAttrs();

// 检测存档
(function checkSave(){
  try{
    const save = localStorage.getItem('raftSave');
    if(save){
      const data = JSON.parse(save);
      if(data && !data.isDead){
        document.getElementById('hasSaveSlot').style.display = 'block';
        document.getElementById('saveInfo').innerHTML = `
          <div>📅 生存第 <b style="color:var(--accent)">${data.day||1}</b> 天 · 等级 <b style="color:var(--accent)">${data.level||1}</b></div>
          <div style="margin-top:2px">❤️ 体力${data.attrs?.hp||'?'}/${data.attrs?.hpMax||'?'} · 🍖 饱腹${data.attrs?.hunger||'?'}/${data.attrs?.hungerMax||'?'}</div>
        `;
      }
    }
  }catch(e){}
})();

// 点击空白关闭面板
document.getElementById('panelOverlay').addEventListener('click', function(e){
  if(e.target === this) closePanel();
});

// 全局禁止长按菜单和文字选取
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('selectstart', e => e.preventDefault());
</script>
